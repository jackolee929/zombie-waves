<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>屍潮狂襲 3.1・雙線無敵版</title>
<style>
  /* ============ 全域 ============ */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #07080d; font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; }

  #gameWrap {
    position: relative; width: 100%; height: 100%;
    max-width: 520px; margin: 0 auto;
    background: #07080d; touch-action: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* ============ HUD ============ */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; color: #e8ecf5;
    text-shadow: 0 2px 6px rgba(0,0,0,.85); z-index: 5;
  }
  .hudBox { font-size: 13px; line-height: 1.5; }
  .hudBox b { font-size: 18px; color: #ffd24d; }
  #waveLabel { font-size: 15px; font-weight: 700; letter-spacing: 2px; color: #ff5c5c; }
  #troopName { color: #7ef0ff; font-weight: 700; font-size: 12px; }

  #combo {
    position: absolute; top: 21%; left: 50%;
    transform: translateX(-50%) scale(1);
    font-size: 28px; font-weight: 900; font-style: italic;
    color: #ff7b3a;
    text-shadow: 0 0 14px rgba(255,123,58,.9), 0 2px 4px #000;
    opacity: 0; pointer-events: none; z-index: 6; transition: opacity .2s;
  }

  /* ============ 技能商城列 ============ */
  #skillBar {
    position: absolute; bottom: 62px; left: 0; right: 0;
    display: flex; gap: 7px; padding: 0 10px; z-index: 8;
  }
  .skBtn {
    flex: 1; background: linear-gradient(180deg, #241a3a, #16112a);
    border: 1px solid #4a3a78; border-radius: 11px;
    color: #e8dfff; padding: 6px 2px 5px; text-align: center;
    cursor: pointer; user-select: none; position: relative; overflow: hidden;
    transition: transform .08s;
  }
  .skBtn:active { transform: scale(.93); }
  .skBtn .i { font-size: 17px; line-height: 1; }
  .skBtn .n { font-size: 11px; font-weight: 700; margin-top: 2px; }
  .skBtn .c { font-size: 10px; color: #ffd24d; }
  .skBtn.dim { opacity: .4; }
  .skBtn.active { border-color: #c26bff; box-shadow: 0 0 12px rgba(194,107,255,.7); }
  .skBtn .cdMask {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: rgba(10,8,20,.72); color: #c9b8ff;
    font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  /* ============ 升級列 ============ */
  #upgradeBar {
    position: absolute; bottom: 10px; left: 0; right: 0;
    display: flex; gap: 8px; padding: 0 10px; z-index: 8;
  }
  .upBtn {
    flex: 1; background: linear-gradient(180deg, #1e2740, #131a2e);
    border: 1px solid #3a4a78; border-radius: 12px;
    color: #dfe7ff; padding: 8px 4px 6px; text-align: center;
    cursor: pointer; user-select: none; transition: transform .08s, box-shadow .08s;
  }
  .upBtn:active { transform: scale(.94); }
  .upBtn .t { font-size: 13px; font-weight: 700; }
  .upBtn .c { font-size: 11px; color: #ffd24d; margin-top: 2px; }
  .upBtn.dim { opacity: .45; }
  .upBtn.flash { box-shadow: 0 0 16px 2px rgba(126,240,255,.8); border-color: #7ef0ff; }

  #ultBtn {
    position: absolute; right: 12px; bottom: 120px;
    width: 68px; height: 68px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff9d5c, #c8331f 70%);
    border: 2px solid #ffd24d; color: #fff;
    font-weight: 900; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    text-align: center; line-height: 1.2;
    cursor: pointer; user-select: none; z-index: 8;
    box-shadow: 0 0 22px rgba(255,120,50,.65);
  }
  #ultBtn.cool {
    background: radial-gradient(circle at 35% 30%, #3a4258, #1c2233 70%);
    border-color: #4a5578; box-shadow: none; color: #8a93ad;
  }
  #ultBtn:active { transform: scale(.92); }

  /* ============ 開始畫面 ============ */
  #startScreen {
    position: absolute; inset: 0; z-index: 20;
    background: radial-gradient(circle at 50% 25%, #1c1420 0%, #07080d 75%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #e8ecf5; text-align: center; padding: 24px;
  }
  #startScreen h1 {
    font-size: 42px; font-weight: 900; letter-spacing: 6px;
    background: linear-gradient(180deg, #b8ff96, #3f7a2e 60%, #1e3d14);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 18px rgba(120,200,90,.4));
  }
  #startScreen .sub {
    margin-top: 6px; font-size: 15px; letter-spacing: 8px; color: #ff3d3d;
    font-weight: 700; text-shadow: 0 0 12px rgba(255,60,60,.7);
  }
  #startScreen .rules {
    margin: 22px 0; font-size: 13px; line-height: 2.1; color: #aab4cf; max-width: 350px;
  }
  #startBtn {
    padding: 14px 56px; font-size: 20px; font-weight: 900; letter-spacing: 4px;
    color: #10140c;
    background: linear-gradient(180deg, #b8ff96, #4fa34a);
    border: none; border-radius: 40px; cursor: pointer;
    box-shadow: 0 0 26px rgba(120,220,100,.5);
  }
  #startBtn:active { transform: scale(.95); }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hudBox">
      <div id="waveLabel">WAVE 1</div>
      <div>擊殺 <b id="killVal">0</b></div>
      <div id="troopName">民兵・生鏽手槍</div>
    </div>
    <div class="hudBox" style="text-align:right">
      <div>💰 <b id="goldVal">0</b></div>
      <div style="font-size:11px;color:#8a93ad" id="diffLabel">威脅 1.0x</div>
    </div>
  </div>

  <div id="combo"></div>
  <div id="ultBtn">軌道砲<br>READY</div>

  <!-- 技能商城（金幣購買，有冷卻） -->
  <div id="skillBar"></div>

  <!-- 永久升級 -->
  <div id="upgradeBar">
    <div class="upBtn" id="btnDmg"><div class="t">⚔️ 火力 Lv.1</div><div class="c">💰 60</div></div>
    <div class="upBtn" id="btnRate"><div class="t">🔥 射速 Lv.1</div><div class="c">💰 60</div></div>
    <div class="upBtn" id="btnTroop"><div class="t">🪖 增兵 x1</div><div class="c">💰 90</div></div>
  </div>

  <div id="startScreen">
    <h1>屍潮狂襲</h1>
    <div class="sub">3.1 雙 線 無 敵 版</div>
    <div class="rules">
      屍潮從<span style="color:#ff5c5c">左右兩道</span>分別壓下，速度數量各不同<br>
      子彈<span style="color:#ffd24d">永遠直線朝上（絕不散開）</span>，多兵=多條平行彈道<br>
      兵力滿 8 就<span style="color:#7ef0ff">整隊晉升軍階</span>，人數重置、火力躍升<br>
      用金幣買<span style="color:#c26bff">技能</span>：狂暴 / 凍結 / 左右清場<br>
      Boss 越晚出現血越厚，中央路障分隔兩道<br>
      殭屍破防扣金幣、Combo 歸零（你不會死）
    </div>
    <button id="startBtn">開 戰</button>
  </div>
</div>

<script>
"use strict";
/* =========================================================
 *  屍潮狂襲 3.1・雙線無敵版
 *  本版重點：
 *   1. 軍階合併封頂 —— 兵力滿 8 晉升、重置回 3，畫面永不塞滿
 *   2. 純直線武器 —— 每顆子彈固定朝上，多管=平行直線，無散彈/無 AoE
 *   3. 技能商城 —— 金幣購買主動技能（狂暴/凍結/左右清場），有冷卻
 *   4. Boss 增厚 —— 每次現身血量再疊加，越晚越肉
 *   5. 中央路障 —— 黃黑警示條紋物理隔牆
 * ========================================================= */

/* ---------- 畫布 ---------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;
const isMobile = /Android|webOS|iPhone|iPad|iPod|IEMobile|Opera Mini/i.test(navigator.userAgent);

function resize() {
  const wrap = document.getElementById("gameWrap");
  DPR = isMobile ? 1.2 : Math.min(window.devicePixelRatio || 1, 2);
  W = wrap.clientWidth; H = wrap.clientHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

/* ---------- 工具 ---------- */
const rand  = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const dist2 = (ax, ay, bx, by) => (ax - bx) ** 2 + (ay - by) ** 2;
const UP = -Math.PI / 2;                              // 「垂直朝上」基準角

/* =========================================================
 *  軍階表 —— 全部純直線射擊
 *  barrels: 平行槍管數（並排的直線，非扇形）
 *  每顆子彈角度永遠 = UP，強化只體現在傷害/射速/穿透/連發
 * ========================================================= */
const TROOPS = [
  { name: "民兵",       desc: "生鏽手槍",   bullet: "ball",   barrels: 1,
    dmg: 6,  rate: 1.7, speed: 640,  pierce: 0,  chain: 0, mode: "normal",
    color: "#ffe08a", body: "#6b7688", size: 8,  aura: null },

  { name: "突擊兵",     desc: "三連發步槍", bullet: "tracer", barrels: 1,
    dmg: 5,  rate: 2.2, speed: 780,  pierce: 0,  chain: 0, mode: "burst3",
    color: "#8affc1", body: "#3f7ad1", size: 9,  aura: null },

  { name: "重裝機槍兵", desc: "雙管平行掃射", bullet: "tracer", barrels: 2,
    dmg: 4.5,rate: 3.3, speed: 840,  pierce: 0,  chain: 0, mode: "normal",
    color: "#ffb35c", body: "#d1662e", size: 10, aura: null },

  { name: "電磁特勤",   desc: "穿透雷射柱", bullet: "laser",  barrels: 1,
    dmg: 13, rate: 2.4, speed: 1200, pierce: 6,  chain: 0, mode: "normal",
    color: "#7ef0ff", body: "#2ea8c9", size: 10, aura: "#7ef0ff" },

  { name: "動力裝甲",   desc: "重型軌道砲彈", bullet: "rail", barrels: 1,
    dmg: 28, rate: 1.6, speed: 1000, pierce: 4,  chain: 0, mode: "normal",
    color: "#ff7b3a", body: "#c93a2e", size: 12, aura: "#ff7b3a" },

  { name: "電漿機甲",   desc: "雙束電漿+鏈電", bullet: "plasma", barrels: 2,
    dmg: 13, rate: 3.0, speed: 950,  pierce: 2,  chain: 1, mode: "normal",
    color: "#c26bff", body: "#8f3ad1", size: 13, aura: "#c26bff" },

  { name: "殲滅泰坦",   desc: "雙柱毀滅光矛", bullet: "spear",  barrels: 2,
    dmg: 34, rate: 2.8, speed: 1300, pierce: 12, chain: 0, mode: "normal",
    color: "#ffe9a8", body: "#e0b64a", size: 15, aura: "#ffd24d" },
];
const MAX_RANK = TROOPS.length - 1;

/* 軍階晉升參數：兵力封頂機制的核心 */
const PROMOTE_AT = 8;        // 兵力累到 8 就晉升
const PROMOTE_RESET = 3;     // 晉升後兵力重置為 3
const MAX_COUNT_CAP = 10;    // 滿階後兵力硬上限（不佔滿畫面）
const MAX_VISIBLE = 8;       // 畫面最多顯示 8 個士兵

/* =========================================================
 *  殭屍種類表
 * ========================================================= */
const ZTYPES = {
  walker:  { hp: 14,  speed: 44,  r: 15, gold: 2,  skin: "#5a7a4a", rot: "#3a5230", eye: "#b8ff5c", label: "蹣跚者" },
  runner:  { hp: 8,   speed: 120, r: 11, gold: 3,  skin: "#7a7a52", rot: "#565638", eye: "#ffe45c", label: "疾屍" },
  tank:    { hp: 90,  speed: 26,  r: 27, gold: 9,  skin: "#6b4a4a", rot: "#4a3030", eye: "#ff5c5c", label: "腫脹巨屍" },
  bomber:  { hp: 18,  speed: 64,  r: 15, gold: 4,  skin: "#8a7a3a", rot: "#5c5226", eye: "#ff9d2e", label: "爆漿屍" },
  ghost:   { hp: 22,  speed: 58,  r: 14, gold: 5,  skin: "#5c5270", rot: "#3a3448", eye: "#c26bff", label: "怨靈" },
  boss:    { hp: 1200,speed: 15,  r: 54, gold: 300,skin: "#4a2a34", rot: "#2e1a20", eye: "#ff2e6d", label: "深淵屍王" },
};

/* 車道性格表 */
const PROFILES = {
  horde: { label: "屍海", color: "#ff5c5c", interval: [0.55, 0.95], batch: [2, 4], spdMul: 0.85, types: ["walker", "tank", "bomber", "walker"] },
  blitz: { label: "疾襲", color: "#ffe45c", interval: [0.95, 1.6],  batch: [1, 2], spdMul: 1.55, types: ["runner", "ghost", "runner"] },
};

/* =========================================================
 *  技能商城表 —— 金幣購買主動技能（無敵版定價偏高）
 *  cost 金幣  cd 冷卻秒數  dur 持續秒數（0=瞬發）
 * ========================================================= */
const SKILLS = [
  { id: "frenzy", name: "狂暴", icon: "⚡", cost: 150, cd: 14, dur: 8,  color: "#ffe45c" },
  { id: "freeze", name: "凍結", icon: "❄", cost: 220, cd: 18, dur: 5,  color: "#7ef0ff" },
  { id: "purgeL", name: "左清", icon: "◀",  cost: 200, cd: 15, dur: 0,  color: "#ff7b3a" },
  { id: "purgeR", name: "右清", icon: "▶",  cost: 200, cd: 15, dur: 0,  color: "#ff7b3a" },
];
const skillCd = {};                                   // 各技能剩餘冷卻
SKILLS.forEach(s => skillCd[s.id] = 0);

/* ---------- 車道幾何 ---------- */
const LANE_PAD = 26;
const BARRIER_W = 16;                                 // 中央路障寬度
function laneBounds(lane) {
  return lane === "L"
    ? { lo: LANE_PAD, hi: W / 2 - BARRIER_W / 2 - LANE_PAD }
    : { lo: W / 2 + BARRIER_W / 2 + LANE_PAD, hi: W - LANE_PAD };
}

/* ---------- 遊戲狀態 ---------- */
const G = {
  running: false, time: 0, wave: 1, kills: 0, gold: 0,
  combo: 0, comboTimer: 0, shake: 0, hitStop: 0, roadScroll: 0,
  ultCd: 0, ultMax: 20, gateTimer: 5,
  waveKillTarget: 16, waveKilled: 0,
  bossAlive: false, bossPending: false, bossCount: 0,   // bossCount 用於 Boss 血量疊加
  flashAlpha: 0, dangerAlpha: 0, breachFlashL: 0, breachFlashR: 0,
  freezeT: 0,                                            // 凍結技能剩餘時間
};

const lanes = {
  L: { profile: "horde", spawnTimer: 1.0, count: 0 },
  R: { profile: "blitz", spawnTimer: 1.4, count: 0 },
};

/* 玩家小隊：rank 軍階 + count 當前兵力（受封頂機制約束） */
const SQUAD = {
  x: 0, targetX: 0,
  rank: 0, count: 1,
  dmgLv: 1, rateLv: 1,
  fireTimer: 0, burstQueue: 0, burstTimer: 0,
  costDmg: 60, costRate: 60, costTroop: 90,
  frenzyT: 0,                                          // 狂暴剩餘時間
};

let zombies = [], bullets = [], particles = [], dmgTexts = [], gates = [], beams = [], decals = [], arcs = [];

/* ---------- 難度曲線 ---------- */
function diffMul() { return (1 + (G.wave - 1) * 0.30) * (1 + G.time / 40 * 0.18); }
function speedMul() { return 1 + (G.wave - 1) * 0.04 + G.time / 60 * 0.05; }

/* ---------- HUD ---------- */
const $ = id => document.getElementById(id);
const hud = {
  wave: $("waveLabel"), kill: $("killVal"), gold: $("goldVal"),
  troop: $("troopName"), diff: $("diffLabel"),
  combo: $("combo"), ult: $("ultBtn"),
  btnDmg: $("btnDmg"), btnRate: $("btnRate"), btnTroop: $("btnTroop"),
  skillBar: $("skillBar"),
};

/* 動態建立技能鈕 */
const skillBtnEls = {};
SKILLS.forEach(s => {
  const el = document.createElement("div");
  el.className = "skBtn";
  el.innerHTML = `<div class="i">${s.icon}</div><div class="n">${s.name}</div><div class="c">💰${s.cost}</div><div class="cdMask" style="display:none"></div>`;
  el.addEventListener("pointerdown", e => { e.stopPropagation(); useSkill(s); });
  hud.skillBar.appendChild(el);
  skillBtnEls[s.id] = el;
});

function refreshHUD() {
  const tp = TROOPS[SQUAD.rank];
  hud.wave.textContent = "WAVE " + G.wave;
  hud.kill.textContent = G.kills;
  hud.gold.textContent = G.gold;
  hud.troop.textContent = tp.name + "・" + tp.desc + "（x" + SQUAD.count + "）";
  hud.diff.textContent = "威脅 " + diffMul().toFixed(1) + "x";
  hud.btnDmg.querySelector(".t").textContent  = "⚔️ 火力 Lv." + SQUAD.dmgLv;
  hud.btnDmg.querySelector(".c").textContent  = "💰 " + SQUAD.costDmg;
  hud.btnRate.querySelector(".t").textContent = "🔥 射速 Lv." + SQUAD.rateLv;
  hud.btnRate.querySelector(".c").textContent = "💰 " + SQUAD.costRate;
  hud.btnTroop.querySelector(".t").textContent= "🪖 增兵（x" + SQUAD.count + "/8）";
  hud.btnTroop.querySelector(".c").textContent= "💰 " + SQUAD.costTroop;
  hud.btnDmg.classList.toggle("dim",  G.gold < SQUAD.costDmg);
  hud.btnRate.classList.toggle("dim", G.gold < SQUAD.costRate);
  hud.btnTroop.classList.toggle("dim",G.gold < SQUAD.costTroop);
  // 技能鈕狀態
  for (const s of SKILLS) {
    const el = skillBtnEls[s.id];
    const cd = skillCd[s.id];
    const mask = el.querySelector(".cdMask");
    el.classList.toggle("dim", G.gold < s.cost || cd > 0);
    // 標記持續中的 buff
    const activeBuff = (s.id === "frenzy" && SQUAD.frenzyT > 0) || (s.id === "freeze" && G.freezeT > 0);
    el.classList.toggle("active", activeBuff);
    if (cd > 0) { mask.style.display = "flex"; mask.textContent = cd.toFixed(0) + "s"; }
    else mask.style.display = "none";
  }
}

/* ---------- 永久升級 ---------- */
function buy(btn, kind) {
  if (kind === "dmg" && G.gold >= SQUAD.costDmg) {
    G.gold -= SQUAD.costDmg; SQUAD.dmgLv++; SQUAD.costDmg = Math.floor(SQUAD.costDmg * 1.42);
  } else if (kind === "rate" && G.gold >= SQUAD.costRate) {
    G.gold -= SQUAD.costRate; SQUAD.rateLv++; SQUAD.costRate = Math.floor(SQUAD.costRate * 1.42);
  } else if (kind === "troop" && G.gold >= SQUAD.costTroop) {
    G.gold -= SQUAD.costTroop; addTroops(1); SQUAD.costTroop = Math.floor(SQUAD.costTroop * 1.45);
  } else return;
  btn.classList.add("flash");
  setTimeout(() => btn.classList.remove("flash"), 180);
  refreshHUD();
}
hud.btnDmg.addEventListener("pointerdown",  e => { e.stopPropagation(); buy(hud.btnDmg,  "dmg"); });
hud.btnRate.addEventListener("pointerdown", e => { e.stopPropagation(); buy(hud.btnRate, "rate"); });
hud.btnTroop.addEventListener("pointerdown",e => { e.stopPropagation(); buy(hud.btnTroop,"troop"); });

/* =========================================================
 *  增兵 + 軍階晉升（封頂機制）
 *  兵力滿 PROMOTE_AT → 晉升軍階、兵力重置 → 畫面永不塞滿
 * ========================================================= */
function addTroops(n) {
  for (let i = 0; i < n; i++) {
    SQUAD.count++;
    if (SQUAD.count > PROMOTE_AT && SQUAD.rank < MAX_RANK) {
      SQUAD.rank++;
      SQUAD.count = PROMOTE_RESET;
      triggerPromotion();
    } else if (SQUAD.rank >= MAX_RANK && SQUAD.count > MAX_COUNT_CAP) {
      SQUAD.count = MAX_COUNT_CAP;                     // 滿階封頂
    }
  }
}

function triggerPromotion() {
  const tp = TROOPS[SQUAD.rank];
  G.flashAlpha = .7; G.shake = 12;
  dmgTexts.push({ x: W / 2, y: H * .44, v: "軍階晉升！", life: 1.5, text: true, color: tp.color });
  dmgTexts.push({ x: W / 2, y: H * .44 + 38, v: tp.name + "・" + tp.desc, life: 1.8, text: true, color: "#ffffff", small: true });
  for (let i = 0; i < 46; i++) {
    const a = (i / 46) * Math.PI * 2;
    particles.push({ x: SQUAD.x, y: squadY(), vx: Math.cos(a) * 300, vy: Math.sin(a) * 300, r: rand(2.5, 5), life: .6, max: .6, color: tp.color });
  }
}

/* =========================================================
 *  技能商城
 * ========================================================= */
function useSkill(s) {
  if (!G.running || skillCd[s.id] > 0 || G.gold < s.cost) return;
  G.gold -= s.cost;
  skillCd[s.id] = s.cd;
  const el = skillBtnEls[s.id];
  el.classList.add("active");
  setTimeout(() => el.classList.remove("active"), 200);

  switch (s.id) {
    case "frenzy":                                    // 狂暴：射速暴增
      SQUAD.frenzyT = s.dur;
      dmgTexts.push({ x: SQUAD.x, y: squadY() - 40, v: "狂暴！", life: 1.0, text2: true });
      break;
    case "freeze":                                    // 凍結：全屍減速
      G.freezeT = s.dur;
      G.flashAlpha = .3;
      dmgTexts.push({ x: W / 2, y: H * .4, v: "❄ 凍結力場 ❄", life: 1.2, text: true, color: "#7ef0ff" });
      break;
    case "purgeL":                                    // 左道清場
      lanePurge("L");
      break;
    case "purgeR":                                    // 右道清場
      lanePurge("R");
      break;
  }
  refreshHUD();
}

function lanePurge(lane) {
  G.shake = 18; G.flashAlpha = .5;
  const cx = lane === "L" ? W * .25 : W * .75;
  beams.push({ x: cx, w: W / 2 - 20, life: .5, max: .5 });   // 整道光柱
  for (const z of zombies) {
    if (z.dead || z.lane !== lane) continue;
    if (z.type === "boss") hitZombie(z, z.maxHp * 0.25, z.x, z.y, true);
    else hitZombie(z, 1e9, z.x, z.y, true);
  }
  dmgTexts.push({ x: cx, y: H * .4, v: (lane === "L" ? "◀ " : "") + "清場" + (lane === "R" ? " ▶" : ""), life: 1.0, text: true, color: "#ff7b3a" });
}

/* ---------- 大招 ---------- */
hud.ult.addEventListener("pointerdown", e => {
  e.stopPropagation();
  if (G.ultCd > 0 || !G.running) return;
  G.ultCd = G.ultMax; G.flashAlpha = 1; G.shake = 26;
  for (let i = 0; i < 6; i++) beams.push({ x: rand(W * .1, W * .9), w: rand(30, 70), life: .55, max: .55 });
  for (const z of zombies) {
    if (z.type === "boss") hitZombie(z, z.maxHp * 0.35, z.x, z.y, true);
    else hitZombie(z, 1e9, z.x, z.y, true);
  }
});

/* ---------- 輸入 ---------- */
let dragging = false;
const wrap = document.getElementById("gameWrap");
wrap.addEventListener("pointerdown", e => { dragging = true; SQUAD.targetX = e.clientX - wrap.getBoundingClientRect().left; });
wrap.addEventListener("pointermove", e => { if (dragging) SQUAD.targetX = e.clientX - wrap.getBoundingClientRect().left; });
window.addEventListener("pointerup", () => dragging = false);

/* =========================================================
 *  生成邏輯
 * ========================================================= */
function rollLaneProfiles() {
  const heavyLeft = Math.random() < 0.5;
  lanes.L.profile = heavyLeft ? "horde" : "blitz";
  lanes.R.profile = heavyLeft ? "blitz" : "horde";
  if (G.wave % 4 === 0) { lanes.L.profile = "horde"; lanes.R.profile = "horde"; }
}

function spawnZombie(type, lane) {
  const t = ZTYPES[type];
  const b = laneBounds(lane);
  const prof = PROFILES[lanes[lane].profile];
  const isBoss = type === "boss";
  // Boss 血量隨出現次數疊加：越晚出現越肉
  const bossMul = isBoss ? (1 + G.bossCount * 0.6) : 1;
  const hp = t.hp * diffMul() * bossMul;
  zombies.push({
    type, lane,
    x: isBoss ? (b.lo + b.hi) / 2 : rand(b.lo + t.r, b.hi - t.r),
    y: -t.r - rand(6, 60),
    r: t.r * (isBoss ? 1 : rand(.9, 1.1)),
    hp, maxHp: hp,
    speed: t.speed * speedMul() * prof.spdMul * rand(.9, 1.1),
    skin: t.skin, rot: t.rot, eye: t.eye, gold: t.gold,
    wob: rand(0, Math.PI * 2), tilt: rand(-.25, .25), lean: rand(.05, .2),
    hitFlash: 0, driftDir: Math.random() < .5 ? -1 : 1,
    stains: Array.from({ length: randi(2, 4) }, () => ({
      ox: rand(-.5, .5), oy: rand(-.4, .5), r: rand(.15, .35),
      c: Math.random() < .5 ? "rgba(90,20,20,.55)" : "rgba(30,45,20,.5)"
    })),
  });
}

function updateLaneSpawns(dt) {
  if (G.bossAlive) return;
  for (const key of ["L", "R"]) {
    const lane = lanes[key];
    const prof = PROFILES[lane.profile];
    lane.spawnTimer -= dt;
    if (lane.spawnTimer <= 0) {
      lane.spawnTimer = clamp(rand(prof.interval[0], prof.interval[1]) - G.wave * 0.03, 0.3, 1.6);
      const batch = randi(prof.batch[0], prof.batch[1]) + Math.floor(G.wave / 4);
      for (let i = 0; i < batch; i++) spawnZombie(prof.types[randi(0, prof.types.length - 1)], key);
    }
  }
}

function spawnGate() {
  const lane = Math.random() < 0.5 ? "L" : "R";
  const b = laneBounds(lane);
  const kinds = ["troop+", "troopx", "power"];
  const k = kinds[randi(0, 2)];
  let payload;
  if (k === "troop+") { const v = randi(3, 6); payload = { k, v, label: "+" + v + " 兵" }; }
  else if (k === "troopx") { payload = { k, v: 2, label: "x2 兵" }; }
  else { payload = { k: "power", v: 2, label: "火力⬆⬆" }; }
  gates.push({ lane, x0: b.lo - LANE_PAD * .5, x1: b.hi + LANE_PAD * .5, y: -50, h: 62, ...payload, used: false });
}

/* =========================================================
 *  傷害 / 擊殺
 * ========================================================= */
function hitZombie(z, dmg, hx, hy, silent) {
  z.hp -= dmg;
  z.hitFlash = 0.08;
  if (!silent) {
    const tp = TROOPS[SQUAD.rank];
    dmgTexts.push({ x: hx + rand(-8, 8), y: hy, v: Math.round(dmg), life: .6,
                    crit: dmg > tp.dmg * SQUAD.dmgLv * 4 });
  }
  if (z.hp <= 0 && !z.dead) { z.dead = true; killZombie(z); }
}

function killZombie(z) {
  G.kills++;
  G.gold += z.gold + Math.floor(G.combo / 5);
  G.combo++; G.comboTimer = 2.0;
  if (z.type !== "boss") G.waveKilled++;

  decals.push({ x: z.x, y: z.y, r: z.r * rand(1.1, 1.5), life: 9, max: 9,
                lobes: Array.from({ length: 4 }, () => ({ a: rand(0, Math.PI * 2), d: rand(.3, .7), r: rand(.3, .55) })) });
  if (decals.length > 40) decals.shift();

  const n = z.type === "boss" ? 110 : 20;
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2), sp = rand(40, z.type === "boss" ? 440 : 280);
    particles.push({ x: z.x, y: z.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
      r: rand(2, z.type === "boss" ? 7 : 4.5), life: rand(.35, .8), max: .8,
      color: Math.random() < .55 ? "#7a1a1a" : (Math.random() < .5 ? z.skin : z.eye), grav: true });
  }

  if (z.type === "bomber") {
    G.shake = Math.max(G.shake, 9);
    for (const o of zombies)
      if (o !== z && !o.dead && dist2(o.x, o.y, z.x, z.y) < 95 * 95) hitZombie(o, z.maxHp * .8, o.x, o.y);
  }
  if (z.type === "boss") {
    G.bossAlive = false;
    G.shake = 24; G.hitStop = 0.14; G.flashAlpha = .65;
    advanceWave();
  } else {
    G.hitStop = Math.max(G.hitStop, 0.010);
  }
}

/* =========================================================
 *  開火 —— 純直線彈幕（每顆角度永遠 = UP）
 * ========================================================= */
function squadY() { return H - 168; }                 // 上移，讓出技能列空間

/* 橫排編隊：最多 8 人（2 排 x4），畫面不塞滿 */
function soldierPositions() {
  const show = Math.min(SQUAD.count, MAX_VISIBLE);
  const perRow = 4;
  const rows = Math.ceil(show / perRow);
  const out = [];
  let idx = 0;
  for (let r = 0; r < rows; r++) {
    const inThis = Math.min(perRow, show - idx);
    for (let c = 0; c < inThis; c++, idx++) {
      out.push({ x: SQUAD.x + (c - (inThis - 1) / 2) * 28, y: squadY() + r * 22 });
    }
  }
  return out;
}

function makeBullet(px, py, tp) {
  const dmgMul = SQUAD.frenzyT > 0 ? 1 : 1;           // 狂暴只加射速，傷害不變（保平衡）
  const dmgBase = tp.dmg * (1 + (SQUAD.dmgLv - 1) * 0.22) * dmgMul;
  // 角度固定朝上（UP），射出後純直線飛，永不轉向、永不散開
  bullets.push({
    x: px, y: py, vx: 0, vy: Math.sin(UP) * tp.speed,
    angle: UP, dmg: dmgBase,
    pierce: tp.pierce, chain: tp.chain,
    color: tp.color, kind: tp.bullet, trail: [], t: 0,
  });
}

function volleyFire(tp) {
  const positions = soldierPositions();
  for (let s = 0; s < positions.length; s++) {
    const p = positions[s];
    for (let bi = 0; bi < tp.barrels; bi++) {
      const ox = tp.barrels > 1 ? (bi - (tp.barrels - 1) / 2) * 8 : 0;  // 平行槍管間距（仍是直線）
      makeBullet(p.x + ox, p.y, tp);
    }
    particles.push({ x: p.x, y: p.y - 8, vx: rand(-25, 25), vy: -rand(70, 130), r: rand(2, 4), life: .1, max: .1, color: tp.color });
  }
}

function chainLightning(fromZ, dmg, remaining, color) {
  if (remaining <= 0) return;
  let next = null, best = 150 * 150;
  for (const o of zombies) {
    if (o.dead || o === fromZ) continue;
    const d = dist2(o.x, o.y, fromZ.x, fromZ.y);
    if (d < best) { best = d; next = o; }
  }
  if (!next) return;
  arcs.push({ x1: fromZ.x, y1: fromZ.y, x2: next.x, y2: next.y, life: .14, max: .14, color });
  hitZombie(next, dmg * .65, next.x, next.y);
  chainLightning(next, dmg * .65, remaining - 1, color);
}

/* =========================================================
 *  更新迴圈
 * ========================================================= */
function update(dt) {
  G.time += dt;
  G.roadScroll = (G.roadScroll + dt * 90) % 80;
  if (G.hitStop > 0) { G.hitStop -= dt; dt *= 0.15; }

  // 技能計時器
  if (SQUAD.frenzyT > 0) SQUAD.frenzyT = Math.max(0, SQUAD.frenzyT - dt);
  if (G.freezeT > 0) G.freezeT = Math.max(0, G.freezeT - dt);
  for (const s of SKILLS) if (skillCd[s.id] > 0) skillCd[s.id] = Math.max(0, skillCd[s.id] - dt);

  if (G.ultCd > 0) G.ultCd = Math.max(0, G.ultCd - dt);
  hud.ult.classList.toggle("cool", G.ultCd > 0);
  hud.ult.innerHTML = G.ultCd > 0 ? "軌道砲<br>" + G.ultCd.toFixed(1) + "s" : "軌道砲<br>READY";

  if (G.comboTimer > 0) { G.comboTimer -= dt; if (G.comboTimer <= 0) G.combo = 0; }
  hud.combo.style.opacity = G.combo >= 3 ? 1 : 0;
  if (G.combo >= 3) {
    hud.combo.textContent = G.combo + " COMBO!";
    hud.combo.style.transform = `translateX(-50%) scale(${1 + Math.min(G.combo, 40) * 0.01})`;
  }

  SQUAD.x += (clamp(SQUAD.targetX, 40, W - 40) - SQUAD.x) * Math.min(1, dt * 12);

  /* --- 開火（射速受狂暴加成） --- */
  const tp = TROOPS[SQUAD.rank];
  const rateMul = SQUAD.frenzyT > 0 ? 2.3 : 1;
  const interval = 1 / (1.7 * tp.rate * (1 + (SQUAD.rateLv - 1) * 0.15) * rateMul);
  SQUAD.fireTimer -= dt;
  if (SQUAD.fireTimer <= 0 && zombies.length) {
    SQUAD.fireTimer = interval;
    volleyFire(tp);
    if (tp.mode === "burst3") { SQUAD.burstQueue = 2; SQUAD.burstTimer = 0.06; }
  }
  if (SQUAD.burstQueue > 0) {
    SQUAD.burstTimer -= dt;
    if (SQUAD.burstTimer <= 0) { SQUAD.burstTimer = 0.06; SQUAD.burstQueue--; volleyFire(tp); }
  }

  updateLaneSpawns(dt);

  // 波次推進
  if (G.waveKilled >= G.waveKillTarget && !G.bossAlive) {
    if (G.wave % 5 === 0 && !G.bossPending) {
      G.bossPending = true; G.bossAlive = true;
      G.bossCount++;                                  // Boss 出現次數 +1 → 下次更肉
      spawnZombie("boss", Math.random() < .5 ? "L" : "R");
      dmgTexts.push({ x: W / 2, y: H * .3, v: "⚠ 深淵屍王現身 ⚠", life: 1.8, text: true, color: "#ff2e6d" });
    } else if (G.wave % 5 !== 0) {
      advanceWave();
    }
  }

  G.gateTimer -= dt;
  if (G.gateTimer <= 0) { G.gateTimer = rand(6.5, 10); spawnGate(); }

  /* --- 殭屍更新（凍結減速 + 車道約束 + 破防懲罰） --- */
  const fenceY = H - 96;
  const freezeMul = G.freezeT > 0 ? 0.32 : 1;         // 凍結時全屍減速
  lanes.L.count = 0; lanes.R.count = 0;
  let nearestYL = 0, nearestYR = 0;
  for (const z of zombies) {
    if (z.dead) continue;
    lanes[z.lane].count++;
    z.wob += dt * (z.type === "runner" ? 11 : 6) * freezeMul;
    const lurch = z.type === "runner" ? 1 : (0.45 + 0.9 * Math.max(0, Math.sin(z.wob * 1.5)));
    z.y += z.speed * lurch * freezeMul * dt;
    const b = laneBounds(z.lane);
    if (z.type === "ghost") z.x += Math.sin(z.wob * .7) * 55 * dt * z.driftDir * freezeMul;
    else z.x += Math.sin(z.wob) * 8 * dt;
    z.x = clamp(z.x, b.lo + z.r, b.hi - z.r);
    if (z.hitFlash > 0) z.hitFlash -= dt;
    if (z.lane === "L") nearestYL = Math.max(nearestYL, z.y); else nearestYR = Math.max(nearestYR, z.y);
    if (z.y + z.r >= fenceY) {
      z.dead = true;
      G.gold = Math.max(0, G.gold - 5); G.combo = 0;
      if (z.lane === "L") G.breachFlashL = .5; else G.breachFlashR = .5;
      G.shake = Math.max(G.shake, 7);
      dmgTexts.push({ x: z.x, y: fenceY - 20, v: "-5💰 破防!", life: .8, crit: true });
      for (let i = 0; i < 16; i++) {
        const a = rand(-Math.PI, 0);
        particles.push({ x: z.x, y: fenceY, vx: Math.cos(a) * rand(80, 260), vy: Math.sin(a) * rand(80, 260), r: rand(2, 5), life: .4, max: .4, color: "#7ef0ff" });
      }
    }
  }
  const nearestY = Math.max(nearestYL, nearestYR);
  const dangerT = clamp((nearestY - H * .55) / (fenceY - H * .55), 0, 1);
  G.dangerAlpha += (dangerT * .5 - G.dangerAlpha) * Math.min(1, dt * 5);
  if (G.breachFlashL > 0) G.breachFlashL -= dt;
  if (G.breachFlashR > 0) G.breachFlashR -= dt;

  /* --- 子彈（純直線） --- */
  for (const b of bullets) {
    b.t += dt;
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > (b.kind === "spear" ? 10 : 6)) b.trail.shift();
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.y < -60) { b.dead = true; continue; }
    const checkZombies = isMobile ? zombies.slice(0, Math.min(30, zombies.length)) : zombies;
    for (const z of checkZombies) {
      if (z.dead || (b.hitSet && b.hitSet.has(z))) continue;
      if (dist2(b.x, b.y, z.x, z.y) < (z.r + 5) ** 2) {
        hitZombie(z, b.dmg, b.x, b.y);
        if (b.chain > 0) chainLightning(z, b.dmg, b.chain, b.color);
        if (b.pierce > 0) { b.pierce--; (b.hitSet ||= new Set()).add(z); }
        else b.dead = true;
        break;
      }
    }
  }

  /* --- 增益門 --- */
  for (const g of gates) {
    g.y += 68 * dt;
    if (g.y > H) g.dead = true;
    if (g.used) continue;
    if (g.y + g.h >= squadY() - 10 && g.y <= squadY() + 30 && SQUAD.x >= g.x0 && SQUAD.x <= g.x1) {
      g.used = true; g.dead = true; applyGate(g);
    }
  }

  /* --- 其他實體 --- */
  for (const p of particles) {
    p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.grav) p.vy += 420 * dt;
    p.vx *= (1 - dt * 2.2);
    if (p.life <= 0) p.dead = true;
  }
  for (const d of dmgTexts) { d.life -= dt; d.y -= 52 * dt; if (d.life <= 0) d.dead = true; }
  for (const bm of beams) { bm.life -= dt; if (bm.life <= 0) bm.dead = true; }
  for (const a of arcs) { a.life -= dt; if (a.life <= 0) a.dead = true; }
  for (const dc of decals) { dc.life -= dt; if (dc.life <= 0) dc.dead = true; }
  if (G.flashAlpha > 0) G.flashAlpha = Math.max(0, G.flashAlpha - dt * 2.2);
  if (G.shake > 0) G.shake = Math.max(0, G.shake - dt * 40);

  zombies = zombies.filter(z => !z.dead);
  bullets = bullets.filter(b => !b.dead);
  gates = gates.filter(g => !g.dead);
  dmgTexts = dmgTexts.filter(d => !d.dead);
  beams = beams.filter(b => !b.dead);
  arcs = arcs.filter(a => !a.dead);
  decals = decals.filter(d => !d.dead);
  particles = particles.filter(p => !p.dead);
  const maxP = isMobile ? 400 : 800;
  while (particles.length > maxP) particles.pop();

  refreshHUD();
}

function applyGate(g) {
  G.flashAlpha = Math.max(G.flashAlpha, .25);
  if (g.k === "troop+") addTroops(g.v);
  else if (g.k === "troopx") addTroops(SQUAD.count);
  else if (g.k === "power") SQUAD.dmgLv += g.v;
  dmgTexts.push({ x: SQUAD.x, y: squadY() - 40, v: g.label, life: 1.0, crit: true, text2: true });
}

function advanceWave() {
  G.wave++;
  G.waveKilled = 0; G.bossPending = false;
  G.waveKillTarget = 16 + G.wave * 4;
  rollLaneProfiles();
  dmgTexts.push({ x: W / 2, y: H * .35, v: "WAVE " + G.wave, life: 1.4, text: true, color: "#7ef0ff" });
  const pL = PROFILES[lanes.L.profile], pR = PROFILES[lanes.R.profile];
  dmgTexts.push({ x: W * .25, y: H * .35 + 40, v: "◀ " + pL.label, life: 1.4, text: true, color: pL.color, small: true });
  dmgTexts.push({ x: W * .75, y: H * .35 + 40, v: pR.label + " ▶", life: 1.4, text: true, color: pR.color, small: true });
}

/* =========================================================
 *  繪製
 * ========================================================= */
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (G.shake > 0) ctx.translate(rand(-G.shake, G.shake) * .5, rand(-G.shake, G.shake) * .5);

  drawRoad();
  drawDecals();
  drawGates();
  drawZombies();
  drawBullets();
  drawArcs();
  drawSquad();
  drawBarrier();                                       // 中央路障（畫在士兵之後蓋住交界）
  drawFence();
  drawParticles();
  drawBeams();
  drawThreatIndicators();
  drawDmgTexts();
  if (G.freezeT > 0) drawFreezeTint();

  ctx.restore();

  drawDangerVignette();
  if (G.flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${G.flashAlpha * .8})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawRoad() {
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, "#0e1018"); grd.addColorStop(1, "#181c28");
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "rgba(80,120,200,.04)"; ctx.fillRect(0, 0, W / 2, H);
  ctx.fillStyle = "rgba(200,120,80,.04)"; ctx.fillRect(W / 2, 0, W / 2, H);
  ctx.strokeStyle = "rgba(255,255,255,.07)"; ctx.lineWidth = 3;
  ctx.setLineDash([26, 50]); ctx.lineDashOffset = -G.roadScroll * 3;
  for (const lx of [W * .25, W * .75]) { ctx.beginPath(); ctx.moveTo(lx, -80); ctx.lineTo(lx, H); ctx.stroke(); }
  ctx.setLineDash([]);
}

/* 中央路障：黃黑警示條紋物理隔牆（捲動） */
function drawBarrier() {
  const cx = W / 2, hw = BARRIER_W / 2;
  ctx.save();
  // 金屬底座
  const grd = ctx.createLinearGradient(cx - hw, 0, cx + hw, 0);
  grd.addColorStop(0, "#1a1d26"); grd.addColorStop(.5, "#3a3f4e"); grd.addColorStop(1, "#1a1d26");
  ctx.fillStyle = grd;
  ctx.fillRect(cx - hw, 0, BARRIER_W, H);
  // 黃黑警示斜紋（往下捲動）
  ctx.save();
  ctx.beginPath(); ctx.rect(cx - hw, 0, BARRIER_W, H); ctx.clip();
  const stripe = 16, off = (G.roadScroll * 2) % (stripe * 2);
  for (let y = -stripe * 2; y < H + stripe * 2; y += stripe * 2) {
    ctx.fillStyle = "#e8c020";
    ctx.beginPath();
    ctx.moveTo(cx - hw, y + off);
    ctx.lineTo(cx + hw, y + off + BARRIER_W);
    ctx.lineTo(cx + hw, y + off + BARRIER_W + stripe);
    ctx.lineTo(cx - hw, y + off + stripe);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  // 分段鉚接橫線
  ctx.strokeStyle = "rgba(0,0,0,.55)"; ctx.lineWidth = 2;
  for (let y = (G.roadScroll * 3) % 60 - 60; y < H; y += 60) {
    ctx.beginPath(); ctx.moveTo(cx - hw, y); ctx.lineTo(cx + hw, y); ctx.stroke();
  }
  // 邊緣霓虹描邊
  if (!isMobile) { ctx.shadowColor = "#ff5c8a"; ctx.shadowBlur = 8; }
  ctx.strokeStyle = "rgba(255,120,150,.6)"; ctx.lineWidth = 1.5;
  ctx.strokeRect(cx - hw, 0, BARRIER_W, H);
  ctx.restore();
}

function drawDecals() {
  for (const dc of decals) {
    const a = clamp(dc.life / dc.max, 0, 1) * .5;
    ctx.fillStyle = `rgba(70,10,12,${a})`;
    ctx.beginPath();
    ctx.arc(dc.x, dc.y, dc.r * .7, 0, Math.PI * 2);
    for (const lb of dc.lobes)
      ctx.arc(dc.x + Math.cos(lb.a) * dc.r * lb.d, dc.y + Math.sin(lb.a) * dc.r * lb.d, dc.r * lb.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFence() {
  const y = H - 96;
  const pulse = 0.5 + Math.sin(G.time * 6) * 0.5;
  ctx.save();
  if (!isMobile) { ctx.shadowColor = "#7ef0ff"; ctx.shadowBlur = 16 + pulse * 12; }
  ctx.strokeStyle = `rgba(126,240,255,${0.7 + pulse * .3})`; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  ctx.strokeStyle = `rgba(255,255,255,${0.2 + pulse * .3})`; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, y + 5); ctx.lineTo(W, y + 5); ctx.stroke();
  ctx.restore();
  if (G.breachFlashL > 0) { ctx.fillStyle = `rgba(255,40,40,${G.breachFlashL * .5})`; ctx.fillRect(0, y - 4, W / 2, 12); }
  if (G.breachFlashR > 0) { ctx.fillStyle = `rgba(255,40,40,${G.breachFlashR * .5})`; ctx.fillRect(W / 2, y - 4, W / 2, 12); }
}

function drawGates() {
  for (const g of gates) {
    ctx.save();
    const grd = ctx.createLinearGradient(0, g.y, 0, g.y + g.h);
    grd.addColorStop(0, "rgba(77,184,255,.05)"); grd.addColorStop(.5, "rgba(77,184,255,.28)"); grd.addColorStop(1, "rgba(77,184,255,.05)");
    ctx.fillStyle = grd; ctx.fillRect(g.x0, g.y, g.x1 - g.x0, g.h);
    ctx.strokeStyle = "rgba(126,240,255,.85)"; ctx.lineWidth = 2;
    ctx.strokeRect(g.x0, g.y, g.x1 - g.x0, g.h);
    ctx.fillStyle = "#eaf7ff"; ctx.font = "900 22px 'Noto Sans TC', sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    if (!isMobile) { ctx.shadowColor = "#4db8ff"; ctx.shadowBlur = 12; }
    ctx.fillText(g.label, (g.x0 + g.x1) / 2, g.y + g.h / 2);
    ctx.restore();
  }
}

/* 殭屍繪製（腐爛人形，同前版） */
function drawZombies() {
  for (const z of zombies) {
    const wob = Math.sin(z.wob) * 3;
    const lurchTilt = Math.sin(z.wob * 1.5) * .08;
    ctx.save();
    ctx.translate(z.x + wob * .4, z.y);
    ctx.rotate(z.tilt * .4 + lurchTilt);
    const r = z.r;
    if (z.type === "ghost") ctx.globalAlpha = .72;

    ctx.fillStyle = z.hitFlash > 0 ? "#e8e8e8" : z.skin;
    ctx.beginPath();
    ctx.moveTo(-r * .7, -r * .2);
    ctx.quadraticCurveTo(-r * .95, r * .5, -r * .5, r * .95);
    ctx.quadraticCurveTo(0, r * 1.2, r * .5, r * .95);
    ctx.quadraticCurveTo(r * .95, r * .5, r * .7, -r * .2);
    ctx.quadraticCurveTo(0, -r * (.55 + z.lean), -r * .7, -r * .2);
    ctx.fill();

    ctx.fillStyle = "rgba(20,24,32,.55)";
    ctx.beginPath();
    ctx.moveTo(-r * .55, r * .1); ctx.lineTo(r * .1, r * .05); ctx.lineTo(r * .3, r * .8);
    ctx.lineTo(-r * .2, r * .95); ctx.lineTo(-r * .6, r * .55); ctx.fill();

    for (const st of z.stains) {
      ctx.fillStyle = st.c;
      ctx.beginPath(); ctx.arc(st.ox * r, st.oy * r, st.r * r, 0, Math.PI * 2); ctx.fill();
    }

    ctx.strokeStyle = z.hitFlash > 0 ? "#e8e8e8" : z.rot;
    ctx.lineWidth = r * .26; ctx.lineCap = "round";
    const armSwing = Math.sin(z.wob * 1.5) * r * .18;
    ctx.beginPath(); ctx.moveTo(-r * .6, -r * .05); ctx.quadraticCurveTo(-r, r * .5, -r * .95, r * 1.05 + armSwing); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r * .6, -r * .05); ctx.quadraticCurveTo(r, r * .5, r * .95, r * 1.05 - armSwing); ctx.stroke();
    ctx.lineWidth = r * .08;
    for (const side of [-1, 1]) {
      const hx = side * r * .95, hy = r * 1.05 + (side < 0 ? armSwing : -armSwing);
      for (let f = -1; f <= 1; f++) { ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(hx + f * r * .12, hy + r * .22); ctx.stroke(); }
    }

    ctx.save();
    ctx.translate(0, -r * (.55 + z.lean)); ctx.rotate(z.tilt);
    const hr = r * .48;
    ctx.fillStyle = z.hitFlash > 0 ? "#e8e8e8" : z.skin;
    ctx.beginPath(); ctx.arc(0, 0, hr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#0a0a0f";
    ctx.beginPath(); ctx.arc(-hr * .38, -hr * .1, hr * .26, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(hr * .38, -hr * .1, hr * .26, 0, Math.PI * 2); ctx.fill();
    ctx.save();
    if (!isMobile) { ctx.shadowColor = z.eye; ctx.shadowBlur = 8; }
    ctx.fillStyle = z.eye;
    ctx.beginPath(); ctx.arc(hr * .38, -hr * .1, hr * .12, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = "#0a0a0f";
    ctx.beginPath();
    ctx.moveTo(-hr * .5, hr * .35);
    ctx.lineTo(-hr * .2, hr * .55 + Math.sin(z.wob * 2) * hr * .12);
    ctx.lineTo(hr * .1, hr * .42);
    ctx.lineTo(hr * .4, hr * .6 + Math.sin(z.wob * 2) * hr * .1);
    ctx.lineTo(hr * .55, hr * .3);
    ctx.quadraticCurveTo(0, hr * .9, -hr * .5, hr * .35); ctx.fill();
    ctx.restore();

    if (z.type === "runner") {
      ctx.strokeStyle = "rgba(255,228,92,.3)"; ctx.lineWidth = 2;
      for (let i = 1; i <= 3; i++) { ctx.beginPath(); ctx.moveTo(-r * .4, -r * .3 - i * 5); ctx.lineTo(-r * .4 + rand(-2, 2), -r * .3 - i * 5 - 14); ctx.stroke(); }
    }
    if (z.type === "tank") {
      ctx.strokeStyle = "#c9b8a8"; ctx.lineWidth = r * .07;
      for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.arc(0, r * .15 + i * r * .2, r * .5, Math.PI * .15, Math.PI * .85); ctx.stroke(); }
    }
    if (z.type === "bomber") {
      const pulse = .5 + Math.sin(G.time * 8 + z.wob) * .5;
      ctx.save();
      if (!isMobile) { ctx.shadowColor = z.eye; ctx.shadowBlur = 10 + pulse * 10; }
      ctx.fillStyle = `rgba(255,180,60,${.6 + pulse * .4})`;
      ctx.beginPath(); ctx.arc(0, r * .45, r * .34 + pulse * 2, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    if (z.type === "ghost") {
      ctx.fillStyle = z.skin;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(i * r * .4 - r * .15, r * .9);
        ctx.quadraticCurveTo(i * r * .4 + Math.sin(z.wob + i) * r * .3, r * 1.7, i * r * .4 + r * .15, r * .9);
        ctx.fill();
      }
    }
    if (z.type === "boss") {
      ctx.fillStyle = "#d9cfc0";
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(i * r * .3 - r * .1, -r * .85);
        ctx.lineTo(i * r * .3, -r * 1.35 - Math.abs(i) * -r * .08);
        ctx.lineTo(i * r * .3 + r * .1, -r * .85); ctx.fill();
      }
      ctx.save();
      if (!isMobile) { ctx.shadowColor = z.eye; ctx.shadowBlur = 14; }
      ctx.fillStyle = z.eye;
      ctx.beginPath(); ctx.arc(0, -r * .75, r * .1, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      const bw = 130;
      ctx.rotate(-(z.tilt * .4 + lurchTilt));
      ctx.fillStyle = "rgba(0,0,0,.6)"; ctx.fillRect(-bw / 2, -r - 40, bw, 9);
      ctx.fillStyle = "#ff2e6d"; ctx.fillRect(-bw / 2, -r - 40, bw * clamp(z.hp / z.maxHp, 0, 1), 9);
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.strokeRect(-bw / 2, -r - 40, bw, 9);
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    if (Math.random() < 0.012)
      particles.push({ x: z.x + rand(-z.r * .5, z.r * .5), y: z.y + z.r * .6, vx: 0, vy: 30, r: rand(1.5, 2.5), life: .5, max: .5, color: "#6b1414", grav: true });
  }
}

/* 子彈繪製（全部直線型態） */
function drawBullets() {
  for (const b of bullets) {
    ctx.save();
    switch (b.kind) {
      case "ball":
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 8; }
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(b.x, b.y, 3.5, 0, Math.PI * 2); ctx.fill();
        break;
      case "tracer": {
        ctx.strokeStyle = b.color; ctx.globalAlpha = .3; ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < b.trail.length; i++) { const t = b.trail[i]; i === 0 ? ctx.moveTo(t.x, t.y) : ctx.lineTo(t.x, t.y); }
        ctx.stroke(); ctx.globalAlpha = 1;
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 8; }
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(b.x, b.y + 14); ctx.lineTo(b.x, b.y); ctx.stroke();
        break;
      }
      case "laser": {
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 14; }
        ctx.strokeStyle = b.color; ctx.lineWidth = 5; ctx.globalAlpha = .45;
        ctx.beginPath(); ctx.moveTo(b.x, b.y + 30); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.globalAlpha = 1; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(b.x, b.y + 30); ctx.lineTo(b.x, b.y); ctx.stroke();
        break;
      }
      case "rail": {                                   // 重型軌道砲彈：粗亮直線光柱
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 16; }
        ctx.strokeStyle = b.color; ctx.lineWidth = 8; ctx.globalAlpha = .4;
        ctx.beginPath(); ctx.moveTo(b.x, b.y + 40); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.globalAlpha = 1; ctx.strokeStyle = "#fff6e8"; ctx.lineWidth = 3.5;
        ctx.beginPath(); ctx.moveTo(b.x, b.y + 40); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
        break;
      }
      case "plasma": {
        const pulse = 1 + Math.sin(b.t * 30) * .3;
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 16; }
        ctx.fillStyle = b.color; ctx.globalAlpha = .5;
        ctx.beginPath(); ctx.arc(b.x, b.y, 7 * pulse, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1; ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.arc(b.x, b.y, 3.2, 0, Math.PI * 2); ctx.fill();
        break;
      }
      case "spear": {
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 18; }
        ctx.strokeStyle = b.color; ctx.lineWidth = 7; ctx.globalAlpha = .4;
        ctx.beginPath(); ctx.moveTo(b.x, b.y + 46); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.globalAlpha = 1; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(b.x, b.y + 46); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.fillStyle = "#ffffff"; ctx.translate(b.x, b.y); ctx.rotate(b.t * 12);
        for (let i = 0; i < 4; i++) { ctx.rotate(Math.PI / 2); ctx.fillRect(-1, -9, 2, 9); }
        break;
      }
    }
    ctx.restore();
  }
}

function drawArcs() {
  for (const a of arcs) {
    const alpha = clamp(a.life / a.max, 0, 1);
    ctx.save(); ctx.globalAlpha = alpha;
    if (!isMobile) { ctx.shadowColor = a.color; ctx.shadowBlur = 10; }
    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(a.x1, a.y1);
    const seg = 5;
    for (let i = 1; i < seg; i++) { const t = i / seg; ctx.lineTo(a.x1 + (a.x2 - a.x1) * t + rand(-9, 9), a.y1 + (a.y2 - a.y1) * t + rand(-9, 9)); }
    ctx.lineTo(a.x2, a.y2); ctx.stroke(); ctx.restore();
  }
}

function drawSquad() {
  const tp = TROOPS[SQUAD.rank];
  const tier = SQUAD.rank;
  for (const p of soldierPositions()) {
    ctx.save(); ctx.translate(p.x, p.y);
    if (tp.aura) {
      ctx.strokeStyle = tp.aura; ctx.globalAlpha = .4 + Math.sin(G.time * 5) * .2; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(0, 12, tp.size + 5, 6, 0, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1;
    }
    if (!isMobile) { ctx.shadowColor = tp.body; ctx.shadowBlur = tier >= 3 ? 12 : 6; }
    ctx.fillStyle = tp.body; ctx.beginPath(); ctx.arc(0, 0, tp.size, 0, Math.PI * 2); ctx.fill();
    if (!isMobile) ctx.shadowBlur = 0;
    if (tier >= 2) {
      ctx.fillStyle = "rgba(255,255,255,.25)";
      ctx.beginPath(); ctx.ellipse(-tp.size * .8, -2, tp.size * .35, tp.size * .5, .3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(tp.size * .8, -2, tp.size * .35, tp.size * .5, -.3, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = "#0e1320"; ctx.beginPath(); ctx.arc(0, -3, tp.size * .62, Math.PI, 0); ctx.fill();
    if (tier >= 4) { ctx.strokeStyle = tp.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-tp.size * .4, -4); ctx.lineTo(tp.size * .4, -4); ctx.stroke(); }
    ctx.strokeStyle = "#dfe7ff"; ctx.lineWidth = 2.5 + tier * .5;
    // 依槍管數畫槍管（並排，都朝上）
    for (let bi = 0; bi < tp.barrels; bi++) {
      const ox = tp.barrels > 1 ? (bi - (tp.barrels - 1) / 2) * 6 : 0;
      ctx.beginPath(); ctx.moveTo(ox, -4); ctx.lineTo(ox, -13 - tier * 2.5); ctx.stroke();
    }
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBeams() {
  for (const bm of beams) {
    const a = clamp(bm.life / bm.max, 0, 1);
    ctx.save(); ctx.globalAlpha = a;
    const grd = ctx.createLinearGradient(bm.x - bm.w / 2, 0, bm.x + bm.w / 2, 0);
    grd.addColorStop(0, "rgba(255,255,255,0)"); grd.addColorStop(.5, "rgba(255,255,255,.95)"); grd.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grd; ctx.fillRect(bm.x - bm.w / 2, 0, bm.w, H);
    ctx.fillStyle = "rgba(126,240,255,.5)"; ctx.fillRect(bm.x - bm.w / 6, 0, bm.w / 3, H);
    ctx.restore();
  }
}

function drawFreezeTint() {
  // 凍結時全屏淡藍
  ctx.fillStyle = `rgba(126,220,255,${0.10 + Math.sin(G.time * 4) * 0.03})`;
  ctx.fillRect(0, 0, W, H);
}

const threatNearY = { L: 0, R: 0 };
function drawThreatIndicators() {
  const drawOne = (cx, lane) => {
    const prof = PROFILES[lanes[lane].profile];
    const cnt = lanes[lane].count;
    const barW = 92, barH = 7, y = 74;
    ctx.fillStyle = "rgba(0,0,0,.45)"; ctx.fillRect(cx - barW / 2, y, barW, barH);
    const hue = 120 - clamp(cnt / 14, 0, 1) * 120;
    ctx.fillStyle = `hsl(${hue}, 85%, 55%)`; ctx.fillRect(cx - barW / 2, y, barW * clamp(cnt / 16, 0, 1), barH);
    ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 1; ctx.strokeRect(cx - barW / 2, y, barW, barH);
    ctx.textAlign = "center"; ctx.font = "900 13px 'Noto Sans TC', sans-serif";
    ctx.fillStyle = prof.color;
    if (!isMobile) { ctx.shadowColor = "#000"; ctx.shadowBlur = 4; }
    ctx.fillText(prof.label + " " + cnt, cx, y - 6);
    if (!isMobile) ctx.shadowBlur = 0;
    const nearY = lane === "L" ? threatNearY.L : threatNearY.R;
    if (nearY > H * .6 && Math.sin(G.time * 12) > 0) {
      ctx.fillStyle = "#ff3d3d"; ctx.font = "900 16px sans-serif"; ctx.fillText("▼", cx, y + 22);
    }
  };
  drawOne(W * .25, "L");
  drawOne(W * .75, "R");
}

function drawDmgTexts() {
  for (const d of dmgTexts) {
    const a = clamp(d.life / .7, 0, 1);
    ctx.globalAlpha = a; ctx.textAlign = "center";
    if (d.text) {
      ctx.font = d.small ? "700 18px 'Noto Sans TC', sans-serif" : "900 30px 'Noto Sans TC', sans-serif";
      ctx.fillStyle = d.color || "#7ef0ff";
      if (!isMobile) { ctx.shadowColor = d.color || "#4db8ff"; ctx.shadowBlur = 16; }
    } else if (d.text2) {
      ctx.font = "900 24px 'Noto Sans TC', sans-serif"; ctx.fillStyle = "#7ef0ff";
      if (!isMobile) { ctx.shadowColor = "#4db8ff"; ctx.shadowBlur = 12; }
    } else {
      ctx.font = d.crit ? "900 19px sans-serif" : "700 13px sans-serif";
      ctx.fillStyle = d.crit ? "#ffd24d" : "#ffffff";
      if (!isMobile) { ctx.shadowColor = "#000"; ctx.shadowBlur = 4; }
    }
    ctx.fillText(d.v, d.x, d.y);
    if (!isMobile) ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawDangerVignette() {
  if (G.dangerAlpha <= 0.01) return;
  const grd = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * .35, W / 2, H / 2, Math.max(W, H) * .72);
  grd.addColorStop(0, "rgba(200,20,20,0)"); grd.addColorStop(1, `rgba(200,20,20,${G.dangerAlpha})`);
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
}

/* ---------- 主迴圈 ---------- */
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  if (G.running) {
    update(dt);
    threatNearY.L = 0; threatNearY.R = 0;
    for (const z of zombies) {
      if (z.dead) continue;
      if (z.lane === "L") threatNearY.L = Math.max(threatNearY.L, z.y);
      else threatNearY.R = Math.max(threatNearY.R, z.y);
    }
    draw();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });

/* ---------- 開始 ---------- */
document.getElementById("startBtn").addEventListener("click", () => {
  document.getElementById("startScreen").style.display = "none";
  SQUAD.x = SQUAD.targetX = W / 2;
  rollLaneProfiles();
  G.running = true;
  refreshHUD();
});
</script>
