<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>屍潮狂襲 3.0・雙線無敵版</title>
<style>
  /* ============ 全域 ============ */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #07080d; font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; }

  #gameWrap {
    position: relative; width: 100%; height: 100%;
    max-width: 520px; margin: 0 auto;
    background: #07080d; touch-action: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* ============ HUD ============ */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; color: #e8ecf5;
    text-shadow: 0 2px 6px rgba(0,0,0,.85); z-index: 5;
  }
  .hudBox { font-size: 13px; line-height: 1.5; }
  .hudBox b { font-size: 18px; color: #ffd24d; }
  #waveLabel { font-size: 15px; font-weight: 700; letter-spacing: 2px; color: #ff5c5c; }
  #troopName { color: #7ef0ff; font-weight: 700; font-size: 12px; }

  #combo {
    position: absolute; top: 21%; left: 50%;
    transform: translateX(-50%) scale(1);
    font-size: 28px; font-weight: 900; font-style: italic;
    color: #ff7b3a;
    text-shadow: 0 0 14px rgba(255,123,58,.9), 0 2px 4px #000;
    opacity: 0; pointer-events: none; z-index: 6; transition: opacity .2s;
  }

  /* ============ 升級列 ============ */
  #upgradeBar {
    position: absolute; bottom: 10px; left: 0; right: 0;
    display: flex; gap: 8px; padding: 0 10px; z-index: 8;
  }
  .upBtn {
    flex: 1; background: linear-gradient(180deg, #1e2740, #131a2e);
    border: 1px solid #3a4a78; border-radius: 12px;
    color: #dfe7ff; padding: 8px 4px 6px; text-align: center;
    cursor: pointer; user-select: none; transition: transform .08s, box-shadow .08s;
  }
  .upBtn:active { transform: scale(.94); }
  .upBtn .t { font-size: 13px; font-weight: 700; }
  .upBtn .c { font-size: 11px; color: #ffd24d; margin-top: 2px; }
  .upBtn.dim { opacity: .45; }
  .upBtn.flash { box-shadow: 0 0 16px 2px rgba(126,240,255,.8); border-color: #7ef0ff; }

  #ultBtn {
    position: absolute; right: 12px; bottom: 84px;
    width: 74px; height: 74px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff9d5c, #c8331f 70%);
    border: 2px solid #ffd24d; color: #fff;
    font-weight: 900; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    text-align: center; line-height: 1.2;
    cursor: pointer; user-select: none; z-index: 8;
    box-shadow: 0 0 22px rgba(255,120,50,.65);
  }
  #ultBtn.cool {
    background: radial-gradient(circle at 35% 30%, #3a4258, #1c2233 70%);
    border-color: #4a5578; box-shadow: none; color: #8a93ad;
  }
  #ultBtn:active { transform: scale(.92); }

  /* ============ 開始畫面 ============ */
  #startScreen {
    position: absolute; inset: 0; z-index: 20;
    background: radial-gradient(circle at 50% 25%, #1c1420 0%, #07080d 75%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #e8ecf5; text-align: center; padding: 24px;
  }
  #startScreen h1 {
    font-size: 42px; font-weight: 900; letter-spacing: 6px;
    background: linear-gradient(180deg, #b8ff96, #3f7a2e 60%, #1e3d14);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 18px rgba(120,200,90,.4));
  }
  #startScreen .sub {
    margin-top: 6px; font-size: 15px; letter-spacing: 8px; color: #ff3d3d;
    font-weight: 700; text-shadow: 0 0 12px rgba(255,60,60,.7);
  }
  #startScreen .rules {
    margin: 22px 0; font-size: 13px; line-height: 2.1; color: #aab4cf; max-width: 350px;
  }
  #startBtn {
    padding: 14px 56px; font-size: 20px; font-weight: 900; letter-spacing: 4px;
    color: #10140c;
    background: linear-gradient(180deg, #b8ff96, #4fa34a);
    border: none; border-radius: 40px; cursor: pointer;
    box-shadow: 0 0 26px rgba(120,220,100,.5);
  }
  #startBtn:active { transform: scale(.95); }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hudBox">
      <div id="waveLabel">WAVE 1</div>
      <div>擊殺 <b id="killVal">0</b></div>
      <div id="troopName">民兵・生鏽手槍</div>
    </div>
    <div class="hudBox" style="text-align:right">
      <div>💰 <b id="goldVal">0</b></div>
      <div style="font-size:11px;color:#8a93ad" id="diffLabel">威脅 1.0x</div>
    </div>
  </div>

  <div id="combo"></div>
  <div id="ultBtn">軌道砲<br>READY</div>

  <div id="upgradeBar">
    <div class="upBtn" id="btnDmg"><div class="t">⚔️ 火力 Lv.1</div><div class="c">💰 60</div></div>
    <div class="upBtn" id="btnRate"><div class="t">🔥 射速 Lv.1</div><div class="c">💰 60</div></div>
    <div class="upBtn" id="btnTroop"><div class="t">🪖 增兵 x1</div><div class="c">💰 90</div></div>
  </div>

  <div id="startScreen">
    <h1>屍潮狂襲</h1>
    <div class="sub">3.0 雙 線 無 敵 版</div>
    <div class="rules">
      屍潮從<span style="color:#ff5c5c">左右兩道</span>分別壓下，速度數量各不同<br>
      左右拖曳小隊，子彈<span style="color:#ffd24d">直線朝上掃射（不追蹤）</span><br>
      火力簾只罩得住一側 →「<span style="color:#7ef0ff">要顧哪邊</span>」是你的抉擇<br>
      看頂端<span style="color:#ff9d2e">威脅指示器</span>判斷屍海道 / 疾襲道<br>
      兵力跨門檻整隊進化，扇形變寬更好罩<br>
      殭屍破防：扣金幣、Combo 歸零（但你不會死）
    </div>
    <button id="startBtn">開 戰</button>
  </div>
</div>

<script>
"use strict";
/* =========================================================
 *  屍潮狂襲 3.0・雙線無敵版
 *  設計核心：左右分流 + 直線不追蹤 + 左右取捨
 *
 *  - 雙車道：左右各自獨立生成，速度/數量/兵種不對稱
 *  - 直線彈幕：士兵橫排，子彈固定角度朝上直射，絕不轉向
 *  - 覆蓋取捨：火力簾只罩小隊正上方，顧左就漏右
 *  - 威脅指示器：頂端顯示各道類型與數量，供判斷
 *  - 難度雙軌：波次 + 存活時間持續拉高屍潮強度
 * ========================================================= */

/* ---------- 畫布 ---------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;

// 手機偵測（效能分流：手機降 DPR、關陰影、限制碰撞檢測）
const isMobile = /Android|webOS|iPhone|iPad|iPod|IEMobile|Opera Mini/i.test(navigator.userAgent);

function resize() {
  const wrap = document.getElementById("gameWrap");
  DPR = isMobile ? 1.2 : Math.min(window.devicePixelRatio || 1, 2);
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

/* ---------- 工具 ---------- */
const rand  = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const dist2 = (ax, ay, bx, by) => (ax - bx) ** 2 + (ay - by) ** 2;
const UP = -Math.PI / 2;                              // 「朝上」的基準角度（Canvas 座標）

/* =========================================================
 *  兵種階級表 —— 兵力跨 min 門檻即整隊進化
 *  fireAngles: 相對「垂直朝上」的固定偏角陣列（單位：弧度）
 *              每顆子彈都沿固定方向直線飛，永不追蹤
 * ========================================================= */
const TROOPS = [
  { min: 1,   name: "民兵",       desc: "生鏽手槍",     bullet: "ball",
    fireAngles: [0], mode: "normal",
    color: "#ffe08a", body: "#6b7688", size: 8,  dmg: 6,  rate: 1.7,  speed: 640,
    pierce: 0, blast: 0,  chain: 0, aura: null },

  { min: 5,   name: "突擊兵",     desc: "三連發步槍",   bullet: "tracer",
    fireAngles: [0], mode: "burst3",
    color: "#8affc1", body: "#3f7ad1", size: 9,  dmg: 5,  rate: 2.1,  speed: 760,
    pierce: 0, blast: 0,  chain: 0, aura: null },

  { min: 10,  name: "重裝機槍兵", desc: "雙管平行掃射", bullet: "tracer",
    fireAngles: [-0.045, 0.045], mode: "normal",
    color: "#ffb35c", body: "#d1662e", size: 10, dmg: 4,  rate: 3.4,  speed: 820,
    pierce: 0, blast: 0,  chain: 0, aura: null },

  { min: 20,  name: "電磁特勤",   desc: "穿透雷射柱",   bullet: "laser",
    fireAngles: [0], mode: "normal",
    color: "#7ef0ff", body: "#2ea8c9", size: 10, dmg: 12, rate: 2.3,  speed: 1200,
    pierce: 6, blast: 0,  chain: 0, aura: "#7ef0ff" },

  { min: 35,  name: "動力裝甲",   desc: "垂直火箭幕",   bullet: "rocket",
    fireAngles: [-0.09, 0.09], mode: "normal",
    color: "#ff7b3a", body: "#c93a2e", size: 12, dmg: 20, rate: 1.3,  speed: 620,
    pierce: 0, blast: 78, chain: 0, aura: "#ff7b3a" },

  { min: 60,  name: "電漿機甲",   desc: "三向電漿+鏈電", bullet: "plasma",
    fireAngles: [-0.20, 0, 0.20], mode: "normal",
    color: "#c26bff", body: "#8f3ad1", size: 13, dmg: 11, rate: 3.0,  speed: 900,
    pierce: 1, blast: 0,  chain: 2, aura: "#c26bff" },

  { min: 100, name: "殲滅泰坦",   desc: "五向毀滅光矛", bullet: "spear",
    fireAngles: [-0.42, -0.21, 0, 0.21, 0.42], mode: "normal",
    color: "#ffe9a8", body: "#e0b64a", size: 15, dmg: 26, rate: 2.6,  speed: 1250,
    pierce: 8, blast: 55, chain: 0, aura: "#ffd24d" },
];
function troopTier() {
  let t = 0;
  for (let i = 0; i < TROOPS.length; i++) if (SQUAD.count >= TROOPS[i].min) t = i;
  return t;
}

/* =========================================================
 *  殭屍種類表 —— 腐爛人形設計
 * ========================================================= */
const ZTYPES = {
  walker:  { hp: 14,  speed: 44,  r: 15, gold: 2,  skin: "#5a7a4a", rot: "#3a5230", eye: "#b8ff5c", label: "蹣跚者" },
  runner:  { hp: 8,   speed: 120, r: 11, gold: 3,  skin: "#7a7a52", rot: "#565638", eye: "#ffe45c", label: "疾屍" },
  tank:    { hp: 90,  speed: 26,  r: 27, gold: 9,  skin: "#6b4a4a", rot: "#4a3030", eye: "#ff5c5c", label: "腫脹巨屍" },
  bomber:  { hp: 18,  speed: 64,  r: 15, gold: 4,  skin: "#8a7a3a", rot: "#5c5226", eye: "#ff9d2e", label: "爆漿屍" },
  ghost:   { hp: 22,  speed: 58,  r: 14, gold: 5,  skin: "#5c5270", rot: "#3a3448", eye: "#c26bff", label: "怨靈" },
  boss:    { hp: 1500,speed: 15,  r: 54, gold: 280,skin: "#4a2a34", rot: "#2e1a20", eye: "#ff2e6d", label: "深淵屍王" },
};

/* =========================================================
 *  車道性格表 —— 造成左右不對稱的來源
 *  horde 屍海：間隔短、批量大、速度慢、重型兵種
 *  blitz 疾襲：間隔長、批量小、速度快、輕型兵種
 * ========================================================= */
const PROFILES = {
  horde: { label: "屍海", color: "#ff5c5c", interval: [0.55, 0.95], batch: [2, 4], spdMul: 0.85, types: ["walker", "tank", "bomber", "walker"] },
  blitz: { label: "疾襲", color: "#ffe45c", interval: [0.95, 1.6],  batch: [1, 2], spdMul: 1.55, types: ["runner", "ghost", "runner"] },
};

/* ---------- 車道幾何 ---------- */
const LANE_PAD = 26;                                  // 車道內側留白
function laneBounds(lane) {
  // 回傳該車道殭屍可活動的 x 範圍
  return lane === "L"
    ? { lo: LANE_PAD, hi: W / 2 - LANE_PAD }
    : { lo: W / 2 + LANE_PAD, hi: W - LANE_PAD };
}

/* ---------- 遊戲狀態 ---------- */
const G = {
  running: false,
  time: 0,
  wave: 1,
  kills: 0,
  gold: 0,
  combo: 0, comboTimer: 0,
  shake: 0, hitStop: 0,
  roadScroll: 0,
  ultCd: 0, ultMax: 20,
  gateTimer: 5,
  waveKillTarget: 16, waveKilled: 0,
  bossAlive: false, bossPending: false,
  flashAlpha: 0,
  dangerAlpha: 0,
  breachFlashL: 0, breachFlashR: 0,                   // 左右各自的破防紅閃
};

/* 每條車道獨立的生成控制器 */
const lanes = {
  L: { profile: "horde", spawnTimer: 1.0, count: 0 },
  R: { profile: "blitz", spawnTimer: 1.4, count: 0 },
};

/* 玩家小隊（單一小隊，只能罩一側 → 左右取捨的核心） */
const SQUAD = {
  x: 0, targetX: 0,
  count: 1,
  dmgLv: 1, rateLv: 1,
  fireTimer: 0, burstQueue: 0, burstTimer: 0,
  costDmg: 60, costRate: 60, costTroop: 90,
  lastTier: 0,
};

let zombies = [], bullets = [], particles = [], dmgTexts = [], gates = [], beams = [], decals = [], arcs = [];

/* ---------- 難度曲線（波次 + 時間雙軌） ---------- */
function diffMul() { return (1 + (G.wave - 1) * 0.30) * (1 + G.time / 40 * 0.18); }
function speedMul() { return 1 + (G.wave - 1) * 0.04 + G.time / 60 * 0.05; }

/* ---------- HUD ---------- */
const $ = id => document.getElementById(id);
const hud = {
  wave: $("waveLabel"), kill: $("killVal"), gold: $("goldVal"),
  troop: $("troopName"), diff: $("diffLabel"),
  combo: $("combo"), ult: $("ultBtn"),
  btnDmg: $("btnDmg"), btnRate: $("btnRate"), btnTroop: $("btnTroop"),
};

function refreshHUD() {
  const tp = TROOPS[troopTier()];
  hud.wave.textContent = "WAVE " + G.wave;
  hud.kill.textContent = G.kills;
  hud.gold.textContent = G.gold;
  hud.troop.textContent = tp.name + "・" + tp.desc + "（x" + SQUAD.count + "）";
  hud.diff.textContent = "威脅 " + diffMul().toFixed(1) + "x";
  hud.btnDmg.querySelector(".t").textContent  = "⚔️ 火力 Lv." + SQUAD.dmgLv;
  hud.btnDmg.querySelector(".c").textContent  = "💰 " + SQUAD.costDmg;
  hud.btnRate.querySelector(".t").textContent = "🔥 射速 Lv." + SQUAD.rateLv;
  hud.btnRate.querySelector(".c").textContent = "💰 " + SQUAD.costRate;
  hud.btnTroop.querySelector(".t").textContent= "🪖 增兵 x" + SQUAD.count;
  hud.btnTroop.querySelector(".c").textContent= "💰 " + SQUAD.costTroop;
  hud.btnDmg.classList.toggle("dim",  G.gold < SQUAD.costDmg);
  hud.btnRate.classList.toggle("dim", G.gold < SQUAD.costRate);
  hud.btnTroop.classList.toggle("dim",G.gold < SQUAD.costTroop);
}

/* ---------- 升級 ---------- */
function buy(btn, kind) {
  if (kind === "dmg" && G.gold >= SQUAD.costDmg) {
    G.gold -= SQUAD.costDmg; SQUAD.dmgLv++;
    SQUAD.costDmg = Math.floor(SQUAD.costDmg * 1.42);
  } else if (kind === "rate" && G.gold >= SQUAD.costRate) {
    G.gold -= SQUAD.costRate; SQUAD.rateLv++;
    SQUAD.costRate = Math.floor(SQUAD.costRate * 1.42);
  } else if (kind === "troop" && G.gold >= SQUAD.costTroop) {
    G.gold -= SQUAD.costTroop; addTroops(1);
    SQUAD.costTroop = Math.floor(SQUAD.costTroop * 1.45);
  } else return;
  btn.classList.add("flash");
  setTimeout(() => btn.classList.remove("flash"), 180);
  refreshHUD();
}
hud.btnDmg.addEventListener("pointerdown",  e => { e.stopPropagation(); buy(hud.btnDmg,  "dmg"); });
hud.btnRate.addEventListener("pointerdown", e => { e.stopPropagation(); buy(hud.btnRate, "rate"); });
hud.btnTroop.addEventListener("pointerdown",e => { e.stopPropagation(); buy(hud.btnTroop,"troop"); });

/* 增兵 + 兵種進化偵測 */
function addTroops(n) {
  SQUAD.count += n;
  const t = troopTier();
  if (t > SQUAD.lastTier) {
    SQUAD.lastTier = t;
    const tp = TROOPS[t];
    G.flashAlpha = .7; G.shake = 12;
    dmgTexts.push({ x: W / 2, y: H * .44, v: "兵種進化！", life: 1.5, text: true, color: tp.color });
    dmgTexts.push({ x: W / 2, y: H * .44 + 38, v: tp.name + "・" + tp.desc, life: 1.8, text: true, color: "#ffffff", small: true });
    for (let i = 0; i < 46; i++) {
      const a = (i / 46) * Math.PI * 2;
      particles.push({ x: SQUAD.x, y: squadY(), vx: Math.cos(a) * 300, vy: Math.sin(a) * 300, r: rand(2.5, 5), life: .6, max: .6, color: tp.color });
    }
  }
}

/* ---------- 大招 ---------- */
hud.ult.addEventListener("pointerdown", e => {
  e.stopPropagation();
  if (G.ultCd > 0 || !G.running) return;
  G.ultCd = G.ultMax;
  G.flashAlpha = 1; G.shake = 26;
  for (let i = 0; i < 6; i++) beams.push({ x: rand(W * .1, W * .9), w: rand(30, 70), life: .55, max: .55 });
  for (const z of zombies) {
    if (z.type === "boss") hitZombie(z, z.maxHp * 0.35, z.x, z.y, true);
    else hitZombie(z, 1e9, z.x, z.y, true);
  }
});

/* ---------- 輸入：左右拖曳小隊 ---------- */
let dragging = false;
const wrap = document.getElementById("gameWrap");
wrap.addEventListener("pointerdown", e => { dragging = true; SQUAD.targetX = e.clientX - wrap.getBoundingClientRect().left; });
wrap.addEventListener("pointermove", e => { if (dragging) SQUAD.targetX = e.clientX - wrap.getBoundingClientRect().left; });
window.addEventListener("pointerup", () => dragging = false);

/* =========================================================
 *  生成邏輯 —— 雙車道不對稱屍潮
 * ========================================================= */
function rollLaneProfiles() {
  // 每波隨機決定左右性格，且會左右對調 → 玩家不能永遠只顧一邊
  const heavyLeft = Math.random() < 0.5;
  lanes.L.profile = heavyLeft ? "horde" : "blitz";
  lanes.R.profile = heavyLeft ? "blitz" : "horde";
  // 每 4 波：雙屍海危機波（兩邊都壓下，逼你瘋狂切換 + 用大招）
  if (G.wave % 4 === 0) { lanes.L.profile = "horde"; lanes.R.profile = "horde"; }
}

function spawnZombie(type, lane) {
  const t = ZTYPES[type];
  const b = laneBounds(lane);
  const prof = PROFILES[lanes[lane].profile];
  zombies.push({
    type, lane,
    x: type === "boss" ? (lane === "L" ? W * .25 : W * .75) : rand(b.lo + t.r, b.hi - t.r),
    y: -t.r - rand(6, 60),
    r: t.r * (type === "boss" ? 1 : rand(.9, 1.1)),
    hp: t.hp * diffMul(), maxHp: t.hp * diffMul(),
    speed: t.speed * speedMul() * prof.spdMul * rand(.9, 1.1),
    skin: t.skin, rot: t.rot, eye: t.eye, gold: t.gold,
    wob: rand(0, Math.PI * 2),
    tilt: rand(-.25, .25),
    lean: rand(.05, .2),
    hitFlash: 0,
    driftDir: Math.random() < .5 ? -1 : 1,
    stains: Array.from({ length: randi(2, 4) }, () => ({
      ox: rand(-.5, .5), oy: rand(-.4, .5), r: rand(.15, .35),
      c: Math.random() < .5 ? "rgba(90,20,20,.55)" : "rgba(30,45,20,.5)"
    })),
  });
}

/* 各車道獨立跑生成計時器 */
function updateLaneSpawns(dt) {
  if (G.bossAlive) return;
  for (const key of ["L", "R"]) {
    const lane = lanes[key];
    const prof = PROFILES[lane.profile];
    lane.spawnTimer -= dt;
    if (lane.spawnTimer <= 0) {
      // 間隔隨波次縮短，屍海道天生更密
      const baseInt = rand(prof.interval[0], prof.interval[1]);
      lane.spawnTimer = clamp(baseInt - G.wave * 0.03, 0.3, 1.6);
      const batch = randi(prof.batch[0], prof.batch[1]) + Math.floor(G.wave / 4);
      for (let i = 0; i < batch; i++) {
        spawnZombie(prof.types[randi(0, prof.types.length - 1)], key);
      }
    }
  }
}

/* 增益門：一次只從單一車道降下，選了這道就得離開另一道 */
function spawnGate() {
  const lane = Math.random() < 0.5 ? "L" : "R";
  const b = laneBounds(lane);
  const kinds = ["troop+", "troopx", "power"];
  const k = kinds[randi(0, 2)];
  let payload;
  if (k === "troop+") { const v = randi(3, 7); payload = { k, v, label: "+" + v + " 兵" }; }
  else if (k === "troopx") { payload = { k, v: 2, label: "x2 兵" }; }
  else { payload = { k: "power", v: 2, label: "火力⬆⬆" }; }
  gates.push({ lane, x0: b.lo - LANE_PAD * .5, x1: b.hi + LANE_PAD * .5, y: -50, h: 62, ...payload, used: false });
}

/* =========================================================
 *  傷害 / 擊殺
 * ========================================================= */
function hitZombie(z, dmg, hx, hy, silent) {
  z.hp -= dmg;
  z.hitFlash = 0.08;
  if (!silent) {
    const tp = TROOPS[troopTier()];
    dmgTexts.push({ x: hx + rand(-8, 8), y: hy, v: Math.round(dmg), life: .6,
                    crit: dmg > tp.dmg * SQUAD.dmgLv * 4 });
  }
  if (z.hp <= 0 && !z.dead) { z.dead = true; killZombie(z); }
}

function killZombie(z) {
  G.kills++;
  G.gold += z.gold + Math.floor(G.combo / 5);
  G.combo++; G.comboTimer = 2.0;
  if (z.type !== "boss") G.waveKilled++;

  // 地面血泊
  decals.push({ x: z.x, y: z.y, r: z.r * rand(1.1, 1.5), life: 9, max: 9,
                lobes: Array.from({ length: 4 }, () => ({ a: rand(0, Math.PI * 2), d: rand(.3, .7), r: rand(.3, .55) })) });
  if (decals.length > 40) decals.shift();

  // 爆漿粒子：血 + 腐肉
  const n = z.type === "boss" ? 110 : 20;
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2), sp = rand(40, z.type === "boss" ? 440 : 280);
    particles.push({
      x: z.x, y: z.y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
      r: rand(2, z.type === "boss" ? 7 : 4.5),
      life: rand(.35, .8), max: .8,
      color: Math.random() < .55 ? "#7a1a1a" : (Math.random() < .5 ? z.skin : z.eye),
      grav: true,
    });
  }

  if (z.type === "bomber") {
    G.shake = Math.max(G.shake, 9);
    for (const o of zombies)
      if (o !== z && !o.dead && dist2(o.x, o.y, z.x, z.y) < 95 * 95) hitZombie(o, z.maxHp * .8, o.x, o.y);
  }
  if (z.type === "boss") {
    G.bossAlive = false;
    G.shake = 24; G.hitStop = 0.14; G.flashAlpha = .65;
    advanceWave();
  } else {
    G.hitStop = Math.max(G.hitStop, 0.010);
  }
}

/* =========================================================
 *  開火系統 —— 直線彈幕（絕不追蹤）
 * ========================================================= */
function squadY() { return H - 132; }

/* 橫排編隊：士兵排成一整排（多的話堆疊多排），形成往上的彈幕簾 */
function soldierPositions() {
  const show = Math.min(SQUAD.count, 15);
  const perRow = Math.min(show, 7);                   // 每排最多 7 人
  const rows = Math.ceil(show / perRow);
  const out = [];
  let idx = 0;
  for (let r = 0; r < rows; r++) {
    const inThis = Math.min(perRow, show - idx);
    for (let c = 0; c < inThis; c++, idx++) {
      const ox = (c - (inThis - 1) / 2) * 26;
      out.push({ x: SQUAD.x + ox, y: squadY() + r * 22 });
    }
  }
  return out;
}

/* 產生一顆直線子彈：angle 為固定飛行方向，射出後不再改變 */
function makeBullet(px, py, angle, tp) {
  const dmgBase = tp.dmg * (1 + (SQUAD.dmgLv - 1) * 0.22);
  bullets.push({
    x: px, y: py,
    vx: Math.cos(angle) * tp.speed, vy: Math.sin(angle) * tp.speed,
    angle,
    dmg: dmgBase,
    pierce: tp.pierce, blast: tp.blast, chain: tp.chain,
    color: tp.color, kind: tp.bullet,
    trail: [], t: 0,
  });
}

/* 一次齊射：每個士兵依兵種的固定偏角陣列朝上直射 */
function volleyFire(tp) {
  const positions = soldierPositions();
  const shooters = Math.min(positions.length, 12);    // 齊射士兵上限（效能保護）
  for (let s = 0; s < shooters; s++) {
    const p = positions[s];
    for (const off of tp.fireAngles) {
      const jit = rand(-0.02, 0.02);                  // 微抖動，視覺自然（仍是直線）
      makeBullet(p.x, p.y, UP + off + jit, tp);
    }
    // 槍口焰
    particles.push({ x: p.x, y: p.y - 8, vx: rand(-25, 25), vy: -rand(70, 130), r: rand(2, 4), life: .1, max: .1, color: tp.color });
  }
}

/* 鏈狀閃電：命中時彈跳至附近殭屍 */
function chainLightning(fromZ, dmg, remaining, color) {
  if (remaining <= 0) return;
  let next = null, best = 150 * 150;
  for (const o of zombies) {
    if (o.dead || o === fromZ) continue;
    const d = dist2(o.x, o.y, fromZ.x, fromZ.y);
    if (d < best) { best = d; next = o; }
  }
  if (!next) return;
  arcs.push({ x1: fromZ.x, y1: fromZ.y, x2: next.x, y2: next.y, life: .14, max: .14, color });
  hitZombie(next, dmg * .65, next.x, next.y);
  chainLightning(next, dmg * .65, remaining - 1, color);
}

/* =========================================================
 *  更新迴圈
 * ========================================================= */
function update(dt) {
  G.time += dt;
  G.roadScroll = (G.roadScroll + dt * 90) % 80;

  if (G.hitStop > 0) { G.hitStop -= dt; dt *= 0.15; }

  if (G.ultCd > 0) G.ultCd = Math.max(0, G.ultCd - dt);
  hud.ult.classList.toggle("cool", G.ultCd > 0);
  hud.ult.innerHTML = G.ultCd > 0 ? "軌道砲<br>" + G.ultCd.toFixed(1) + "s" : "軌道砲<br>READY";

  if (G.comboTimer > 0) { G.comboTimer -= dt; if (G.comboTimer <= 0) G.combo = 0; }
  hud.combo.style.opacity = G.combo >= 3 ? 1 : 0;
  if (G.combo >= 3) {
    hud.combo.textContent = G.combo + " COMBO!";
    hud.combo.style.transform = `translateX(-50%) scale(${1 + Math.min(G.combo, 40) * 0.01})`;
  }

  // 小隊平滑跟隨手指（全寬移動）
  SQUAD.x += (clamp(SQUAD.targetX, 40, W - 40) - SQUAD.x) * Math.min(1, dt * 12);

  /* --- 開火（含 burst 佇列） --- */
  const tp = TROOPS[troopTier()];
  const interval = 1 / (1.7 * tp.rate * (1 + (SQUAD.rateLv - 1) * 0.15));
  SQUAD.fireTimer -= dt;
  if (SQUAD.fireTimer <= 0 && zombies.length) {
    SQUAD.fireTimer = interval;
    volleyFire(tp);
    if (tp.mode === "burst3") { SQUAD.burstQueue = 2; SQUAD.burstTimer = 0.06; }
  }
  if (SQUAD.burstQueue > 0) {
    SQUAD.burstTimer -= dt;
    if (SQUAD.burstTimer <= 0) { SQUAD.burstTimer = 0.06; SQUAD.burstQueue--; volleyFire(tp); }
  }

  /* --- 雙車道生成 --- */
  updateLaneSpawns(dt);

  // 波次推進
  if (G.waveKilled >= G.waveKillTarget && !G.bossAlive) {
    if (G.wave % 5 === 0 && !G.bossPending) {
      G.bossPending = true; G.bossAlive = true;
      spawnZombie("boss", "L");
      spawnZombie("boss", "R");                        // Boss 波：左右各一隻屍王
      dmgTexts.push({ x: W / 2, y: H * .3, v: "⚠ 雙屍王現身 ⚠", life: 1.8, text: true, color: "#ff2e6d" });
    } else if (G.wave % 5 !== 0) {
      advanceWave();
    }
  }

  G.gateTimer -= dt;
  if (G.gateTimer <= 0) { G.gateTimer = rand(6.5, 10); spawnGate(); }

  /* --- 殭屍更新（蹣跚步態 + 車道約束 + 破防懲罰） --- */
  const fenceY = H - 96;
  lanes.L.count = 0; lanes.R.count = 0;
  let nearestYL = 0, nearestYR = 0;
  for (const z of zombies) {
    if (z.dead) continue;
    lanes[z.lane].count++;
    z.wob += dt * (z.type === "runner" ? 11 : 6);
    // 蹣跚脈衝：一步一頓（疾屍除外，牠是狂奔）
    const lurch = z.type === "runner" ? 1 : (0.45 + 0.9 * Math.max(0, Math.sin(z.wob * 1.5)));
    z.y += z.speed * lurch * dt;
    // 車道內橫向漂移，但夾在自己車道範圍內（不跨線）
    const b = laneBounds(z.lane);
    if (z.type === "ghost") z.x += Math.sin(z.wob * .7) * 55 * dt * z.driftDir;
    else z.x += Math.sin(z.wob) * 8 * dt;
    z.x = clamp(z.x, b.lo + z.r, b.hi - z.r);
    if (z.hitFlash > 0) z.hitFlash -= dt;
    if (z.lane === "L") nearestYL = Math.max(nearestYL, z.y);
    else nearestYR = Math.max(nearestYR, z.y);
    // 破防：汽化但懲罰（無敵版緊張感來源）
    if (z.y + z.r >= fenceY) {
      z.dead = true;
      G.gold = Math.max(0, G.gold - 5);
      G.combo = 0;
      if (z.lane === "L") G.breachFlashL = .5; else G.breachFlashR = .5;
      G.shake = Math.max(G.shake, 7);
      dmgTexts.push({ x: z.x, y: fenceY - 20, v: "-5💰 破防!", life: .8, crit: true });
      for (let i = 0; i < 16; i++) {
        const a = rand(-Math.PI, 0);
        particles.push({ x: z.x, y: fenceY, vx: Math.cos(a) * rand(80, 260), vy: Math.sin(a) * rand(80, 260), r: rand(2, 5), life: .4, max: .4, color: "#7ef0ff" });
      }
    }
  }
  // 危險警戒：取左右較逼近者
  const nearestY = Math.max(nearestYL, nearestYR);
  const dangerT = clamp((nearestY - H * .55) / (fenceY - H * .55), 0, 1);
  G.dangerAlpha += (dangerT * .5 - G.dangerAlpha) * Math.min(1, dt * 5);
  if (G.breachFlashL > 0) G.breachFlashL -= dt;
  if (G.breachFlashR > 0) G.breachFlashR -= dt;

  /* --- 子彈更新（直線飛行，命中偵測） --- */
  for (const b of bullets) {
    b.t += dt;
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > (b.kind === "spear" ? 10 : 6)) b.trail.shift();
    b.x += b.vx * dt; b.y += b.vy * dt;                // 純直線，永不轉向
    if (b.x < -40 || b.x > W + 40 || b.y < -60 || b.y > H + 40) { b.dead = true; continue; }
    const checkZombies = isMobile ? zombies.slice(0, Math.min(30, zombies.length)) : zombies;
    for (const z of checkZombies) {
      if (z.dead || (b.hitSet && b.hitSet.has(z))) continue;
      if (dist2(b.x, b.y, z.x, z.y) < (z.r + 5) ** 2) {
        hitZombie(z, b.dmg, b.x, b.y);
        if (b.chain > 0) chainLightning(z, b.dmg, b.chain, b.color);
        if (b.blast > 0) {
          G.shake = Math.max(G.shake, b.kind === "rocket" ? 8 : 5);
          const smoke = b.kind === "rocket" ? 22 : 12;
          for (let i = 0; i < smoke; i++) {
            const a = rand(0, Math.PI * 2), sp = rand(50, 260);
            particles.push({ x: b.x, y: b.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - (b.kind === "rocket" ? 60 : 0),
                             r: rand(3, b.kind === "rocket" ? 8 : 5), life: rand(.25, .5), max: .5,
                             color: Math.random() < .5 ? b.color : "#5c5c66" });
          }
          for (const o of zombies)
            if (o !== z && !o.dead && dist2(o.x, o.y, b.x, b.y) < b.blast ** 2) hitZombie(o, b.dmg * .6, o.x, o.y);
        }
        if (b.pierce > 0) { b.pierce--; (b.hitSet ||= new Set()).add(z); }
        else b.dead = true;
        break;
      }
    }
  }

  /* --- 增益門（單車道降下） --- */
  for (const g of gates) {
    g.y += 68 * dt;
    if (g.y > H) g.dead = true;
    if (g.used) continue;
    // 小隊必須在該門所屬車道的 x 範圍內、且 y 帶重疊，才吃得到
    if (g.y + g.h >= squadY() - 10 && g.y <= squadY() + 30 && SQUAD.x >= g.x0 && SQUAD.x <= g.x1) {
      g.used = true; g.dead = true;
      applyGate(g);
    }
  }

  /* --- 粒子 / 文字 / 光柱 / 電弧 / 血泊 --- */
  for (const p of particles) {
    p.life -= dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.grav) p.vy += 420 * dt;
    p.vx *= (1 - dt * 2.2);
    if (p.life <= 0) p.dead = true;
  }
  for (const d of dmgTexts) { d.life -= dt; d.y -= 52 * dt; if (d.life <= 0) d.dead = true; }
  for (const bm of beams) { bm.life -= dt; if (bm.life <= 0) bm.dead = true; }
  for (const a of arcs) { a.life -= dt; if (a.life <= 0) a.dead = true; }
  for (const dc of decals) { dc.life -= dt; if (dc.life <= 0) dc.dead = true; }
  if (G.flashAlpha > 0) G.flashAlpha = Math.max(0, G.flashAlpha - dt * 2.2);
  if (G.shake > 0) G.shake = Math.max(0, G.shake - dt * 40);

  zombies  = zombies.filter(z => !z.dead);
  bullets  = bullets.filter(b => !b.dead);
  gates    = gates.filter(g => !g.dead);
  dmgTexts = dmgTexts.filter(d => !d.dead);
  beams    = beams.filter(b => !b.dead);
  arcs     = arcs.filter(a => !a.dead);
  decals   = decals.filter(d => !d.dead);
  particles= particles.filter(p => !p.dead);
  const maxP = isMobile ? 400 : 800;
  while (particles.length > maxP) particles.pop();

  refreshHUD();
}

function applyGate(g) {
  G.flashAlpha = Math.max(G.flashAlpha, .25);
  if (g.k === "troop+") addTroops(g.v);
  else if (g.k === "troopx") addTroops(SQUAD.count);
  else if (g.k === "power") SQUAD.dmgLv += g.v;
  dmgTexts.push({ x: SQUAD.x, y: squadY() - 40, v: g.label, life: 1.0, crit: true, text2: true });
}

function advanceWave() {
  G.wave++;
  G.waveKilled = 0;
  G.bossPending = false;
  G.waveKillTarget = 16 + G.wave * 4;
  rollLaneProfiles();                                 // 換波 → 重擲左右性格
  dmgTexts.push({ x: W / 2, y: H * .35, v: "WAVE " + G.wave, life: 1.4, text: true, color: "#7ef0ff" });
  // 顯示本波左右性格提示
  const pL = PROFILES[lanes.L.profile], pR = PROFILES[lanes.R.profile];
  dmgTexts.push({ x: W * .25, y: H * .35 + 40, v: "◀ " + pL.label, life: 1.4, text: true, color: pL.color, small: true });
  dmgTexts.push({ x: W * .75, y: H * .35 + 40, v: pR.label + " ▶", life: 1.4, text: true, color: pR.color, small: true });
}

/* =========================================================
 *  繪製
 * ========================================================= */
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (G.shake > 0) ctx.translate(rand(-G.shake, G.shake) * .5, rand(-G.shake, G.shake) * .5);

  drawRoad();
  drawDecals();
  drawGates();
  drawZombies();
  drawBullets();
  drawArcs();
  drawSquad();
  drawFence();
  drawParticles();
  drawBeams();
  drawThreatIndicators();
  drawDmgTexts();

  ctx.restore();

  drawDangerVignette();
  if (G.flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${G.flashAlpha * .8})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawRoad() {
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, "#0e1018");
  grd.addColorStop(1, "#181c28");
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // 兩道車道微色差（左偏冷、右偏暖），凸顯分流
  ctx.fillStyle = "rgba(80,120,200,.04)";
  ctx.fillRect(0, 0, W / 2, H);
  ctx.fillStyle = "rgba(200,120,80,.04)";
  ctx.fillRect(W / 2, 0, W / 2, H);

  // 車道虛線
  ctx.strokeStyle = "rgba(255,255,255,.07)";
  ctx.lineWidth = 3;
  ctx.setLineDash([26, 50]);
  ctx.lineDashOffset = -G.roadScroll * 3;
  for (const lx of [W * .25, W * .75]) {
    ctx.beginPath(); ctx.moveTo(lx, -80); ctx.lineTo(lx, H); ctx.stroke();
  }
  ctx.setLineDash([]);

  // 中央霓虹分隔線（左右分流的視覺主軸）
  const pulse = 0.5 + Math.sin(G.time * 3) * 0.5;
  ctx.save();
  if (!isMobile) { ctx.shadowColor = "#ff5c8a"; ctx.shadowBlur = 12 + pulse * 8; }
  ctx.strokeStyle = `rgba(255,92,138,${0.35 + pulse * .3})`;
  ctx.lineWidth = 2;
  ctx.setLineDash([12, 14]);
  ctx.lineDashOffset = G.roadScroll * 2;
  ctx.beginPath(); ctx.moveTo(W / 2, -20); ctx.lineTo(W / 2, H); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawDecals() {
  for (const dc of decals) {
    const a = clamp(dc.life / dc.max, 0, 1) * .5;
    ctx.fillStyle = `rgba(70,10,12,${a})`;
    ctx.beginPath();
    ctx.arc(dc.x, dc.y, dc.r * .7, 0, Math.PI * 2);
    for (const lb of dc.lobes)
      ctx.arc(dc.x + Math.cos(lb.a) * dc.r * lb.d, dc.y + Math.sin(lb.a) * dc.r * lb.d, dc.r * lb.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFence() {
  const y = H - 96;
  const pulse = 0.5 + Math.sin(G.time * 6) * 0.5;
  ctx.save();
  if (!isMobile) { ctx.shadowColor = "#7ef0ff"; ctx.shadowBlur = 16 + pulse * 12; }
  ctx.strokeStyle = `rgba(126,240,255,${0.7 + pulse * .3})`;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  ctx.strokeStyle = `rgba(255,255,255,${0.2 + pulse * .3})`;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, y + 5); ctx.lineTo(W, y + 5); ctx.stroke();
  ctx.restore();
  // 左右各自的破防紅閃
  if (G.breachFlashL > 0) { ctx.fillStyle = `rgba(255,40,40,${G.breachFlashL * .5})`; ctx.fillRect(0, y - 4, W / 2, 12); }
  if (G.breachFlashR > 0) { ctx.fillStyle = `rgba(255,40,40,${G.breachFlashR * .5})`; ctx.fillRect(W / 2, y - 4, W / 2, 12); }
}

function drawGates() {
  for (const g of gates) {
    ctx.save();
    const grd = ctx.createLinearGradient(0, g.y, 0, g.y + g.h);
    grd.addColorStop(0, "rgba(77,184,255,.05)");
    grd.addColorStop(.5, "rgba(77,184,255,.28)");
    grd.addColorStop(1, "rgba(77,184,255,.05)");
    ctx.fillStyle = grd;
    ctx.fillRect(g.x0, g.y, g.x1 - g.x0, g.h);
    ctx.strokeStyle = "rgba(126,240,255,.85)";
    ctx.lineWidth = 2;
    ctx.strokeRect(g.x0, g.y, g.x1 - g.x0, g.h);
    ctx.fillStyle = "#eaf7ff";
    ctx.font = "900 22px 'Noto Sans TC', sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    if (!isMobile) { ctx.shadowColor = "#4db8ff"; ctx.shadowBlur = 12; }
    ctx.fillText(g.label, (g.x0 + g.x1) / 2, g.y + g.h / 2);
    ctx.restore();
  }
}

/* =========================================================
 *  殭屍繪製 —— 腐爛人形
 * ========================================================= */
function drawZombies() {
  for (const z of zombies) {
    const wob = Math.sin(z.wob) * 3;
    const lurchTilt = Math.sin(z.wob * 1.5) * .08;
    ctx.save();
    ctx.translate(z.x + wob * .4, z.y);
    ctx.rotate(z.tilt * .4 + lurchTilt);
    const r = z.r;

    if (z.type === "ghost") ctx.globalAlpha = .72;

    /* 軀幹：駝背不規則形 */
    ctx.fillStyle = z.hitFlash > 0 ? "#e8e8e8" : z.skin;
    ctx.beginPath();
    ctx.moveTo(-r * .7, -r * .2);
    ctx.quadraticCurveTo(-r * .95, r * .5, -r * .5, r * .95);
    ctx.quadraticCurveTo(0, r * 1.2, r * .5, r * .95);
    ctx.quadraticCurveTo(r * .95, r * .5, r * .7, -r * .2);
    ctx.quadraticCurveTo(0, -r * (.55 + z.lean), -r * .7, -r * .2);
    ctx.fill();

    /* 破爛衣物色塊 */
    ctx.fillStyle = "rgba(20,24,32,.55)";
    ctx.beginPath();
    ctx.moveTo(-r * .55, r * .1);
    ctx.lineTo(r * .1, r * .05);
    ctx.lineTo(r * .3, r * .8);
    ctx.lineTo(-r * .2, r * .95);
    ctx.lineTo(-r * .6, r * .55);
    ctx.fill();

    /* 腐斑 / 血漬 */
    for (const st of z.stains) {
      ctx.fillStyle = st.c;
      ctx.beginPath();
      ctx.arc(st.ox * r, st.oy * r, st.r * r, 0, Math.PI * 2);
      ctx.fill();
    }

    /* 雙臂前撲 + 爪 */
    ctx.strokeStyle = z.hitFlash > 0 ? "#e8e8e8" : z.rot;
    ctx.lineWidth = r * .26;
    ctx.lineCap = "round";
    const armSwing = Math.sin(z.wob * 1.5) * r * .18;
    ctx.beginPath();
    ctx.moveTo(-r * .6, -r * .05);
    ctx.quadraticCurveTo(-r * 1.0, r * .5, -r * .95, r * 1.05 + armSwing);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r * .6, -r * .05);
    ctx.quadraticCurveTo(r * 1.0, r * .5, r * .95, r * 1.05 - armSwing);
    ctx.stroke();
    ctx.lineWidth = r * .08;
    for (const side of [-1, 1]) {
      const hx = side * r * .95, hy = r * 1.05 + (side < 0 ? armSwing : -armSwing);
      for (let f = -1; f <= 1; f++) {
        ctx.beginPath();
        ctx.moveTo(hx, hy);
        ctx.lineTo(hx + f * r * .12, hy + r * .22);
        ctx.stroke();
      }
    }

    /* 頭：歪斜 + 空洞眼 + 裂顎 */
    ctx.save();
    ctx.translate(0, -r * (.55 + z.lean));
    ctx.rotate(z.tilt);
    const hr = r * .48;
    ctx.fillStyle = z.hitFlash > 0 ? "#e8e8e8" : z.skin;
    ctx.beginPath(); ctx.arc(0, 0, hr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#0a0a0f";
    ctx.beginPath(); ctx.arc(-hr * .38, -hr * .1, hr * .26, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( hr * .38, -hr * .1, hr * .26, 0, Math.PI * 2); ctx.fill();
    ctx.save();
    if (!isMobile) { ctx.shadowColor = z.eye; ctx.shadowBlur = 8; }
    ctx.fillStyle = z.eye;
    ctx.beginPath(); ctx.arc(hr * .38, -hr * .1, hr * .12, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = "#0a0a0f";
    ctx.beginPath();
    ctx.moveTo(-hr * .5, hr * .35);
    ctx.lineTo(-hr * .2, hr * .55 + Math.sin(z.wob * 2) * hr * .12);
    ctx.lineTo(hr * .1, hr * .42);
    ctx.lineTo(hr * .4, hr * .6 + Math.sin(z.wob * 2) * hr * .1);
    ctx.lineTo(hr * .55, hr * .3);
    ctx.quadraticCurveTo(0, hr * .9, -hr * .5, hr * .35);
    ctx.fill();
    ctx.restore();

    /* 種類特徵 */
    if (z.type === "runner") {
      ctx.strokeStyle = `rgba(255,228,92,.3)`;
      ctx.lineWidth = 2;
      for (let i = 1; i <= 3; i++) {
        ctx.beginPath();
        ctx.moveTo(-r * .4, -r * .3 - i * 5);
        ctx.lineTo(-r * .4 + rand(-2, 2), -r * .3 - i * 5 - 14);
        ctx.stroke();
      }
    }
    if (z.type === "tank") {
      ctx.strokeStyle = "#c9b8a8";
      ctx.lineWidth = r * .07;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(0, r * .15 + i * r * .2, r * .5, Math.PI * .15, Math.PI * .85);
        ctx.stroke();
      }
    }
    if (z.type === "bomber") {
      const pulse = .5 + Math.sin(G.time * 8 + z.wob) * .5;
      ctx.save();
      if (!isMobile) { ctx.shadowColor = z.eye; ctx.shadowBlur = 10 + pulse * 10; }
      ctx.fillStyle = `rgba(255,180,60,${.6 + pulse * .4})`;
      ctx.beginPath(); ctx.arc(0, r * .45, r * .34 + pulse * 2, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    if (z.type === "ghost") {
      ctx.fillStyle = z.skin;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(i * r * .4 - r * .15, r * .9);
        ctx.quadraticCurveTo(i * r * .4 + Math.sin(z.wob + i) * r * .3, r * 1.7, i * r * .4 + r * .15, r * .9);
        ctx.fill();
      }
    }
    if (z.type === "boss") {
      ctx.fillStyle = "#d9cfc0";
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(i * r * .3 - r * .1, -r * .85);
        ctx.lineTo(i * r * .3, -r * 1.35 - Math.abs(i) * -r * .08);
        ctx.lineTo(i * r * .3 + r * .1, -r * .85);
        ctx.fill();
      }
      ctx.save();
      if (!isMobile) { ctx.shadowColor = z.eye; ctx.shadowBlur = 14; }
      ctx.fillStyle = z.eye;
      ctx.beginPath(); ctx.arc(0, -r * .75, r * .1, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      const bw = 130;
      ctx.rotate(-(z.tilt * .4 + lurchTilt));
      ctx.fillStyle = "rgba(0,0,0,.6)";
      ctx.fillRect(-bw / 2, -r - 40, bw, 9);
      ctx.fillStyle = "#ff2e6d";
      ctx.fillRect(-bw / 2, -r - 40, bw * clamp(z.hp / z.maxHp, 0, 1), 9);
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 1;
      ctx.strokeRect(-bw / 2, -r - 40, bw, 9);
    }

    ctx.globalAlpha = 1;
    ctx.restore();

    if (Math.random() < 0.012) {
      particles.push({ x: z.x + rand(-z.r * .5, z.r * .5), y: z.y + z.r * .6, vx: 0, vy: 30, r: rand(1.5, 2.5), life: .5, max: .5, color: "#6b1414", grav: true });
    }
  }
}

/* =========================================================
 *  子彈繪製 —— 依 kind 分流
 * ========================================================= */
function drawBullets() {
  for (const b of bullets) {
    ctx.save();
    switch (b.kind) {
      case "ball":
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 8; }
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(b.x, b.y, 3.5, 0, Math.PI * 2); ctx.fill();
        break;

      case "tracer": {
        ctx.strokeStyle = b.color; ctx.globalAlpha = .3; ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < b.trail.length; i++) {
          const t = b.trail[i];
          i === 0 ? ctx.moveTo(t.x, t.y) : ctx.lineTo(t.x, t.y);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 8; }
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(b.x - Math.cos(b.angle) * 14, b.y - Math.sin(b.angle) * 14);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        break;
      }

      case "laser": {
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 14; }
        ctx.strokeStyle = b.color; ctx.lineWidth = 5; ctx.globalAlpha = .45;
        ctx.beginPath();
        ctx.moveTo(b.x - Math.cos(b.angle) * 30, b.y - Math.sin(b.angle) * 30);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(b.x - Math.cos(b.angle) * 30, b.y - Math.sin(b.angle) * 30);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        break;
      }

      case "rocket": {
        particles.push({ x: b.x - Math.cos(b.angle) * 10, y: b.y - Math.sin(b.angle) * 10,
                         vx: rand(-30, 30), vy: rand(20, 80), r: rand(2, 4), life: .18, max: .18,
                         color: Math.random() < .5 ? "#ff9d5c" : "#ffd24d" });
        ctx.translate(b.x, b.y);
        ctx.rotate(b.angle + Math.PI / 2);
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 10; }
        ctx.fillStyle = "#e8e8e8";
        ctx.beginPath();
        ctx.moveTo(0, -10); ctx.lineTo(5, 6); ctx.lineTo(-5, 6); ctx.fill();
        ctx.fillStyle = b.color;
        ctx.fillRect(-4, 4, 8, 5);
        break;
      }

      case "plasma": {
        const pulse = 1 + Math.sin(b.t * 30) * .3;
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 16; }
        ctx.fillStyle = b.color; ctx.globalAlpha = .5;
        ctx.beginPath(); ctx.arc(b.x, b.y, 7 * pulse, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.arc(b.x, b.y, 3.2, 0, Math.PI * 2); ctx.fill();
        if (Math.random() < .4) {
          ctx.strokeStyle = b.color; ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(b.x, b.y);
          ctx.lineTo(b.x + rand(-12, 12), b.y + rand(-12, 12));
          ctx.stroke();
        }
        break;
      }

      case "spear": {
        if (!isMobile) { ctx.shadowColor = b.color; ctx.shadowBlur = 18; }
        ctx.strokeStyle = b.color; ctx.lineWidth = 7; ctx.globalAlpha = .4;
        ctx.beginPath();
        ctx.moveTo(b.x - Math.cos(b.angle) * 46, b.y - Math.sin(b.angle) * 46);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(b.x - Math.cos(b.angle) * 46, b.y - Math.sin(b.angle) * 46);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        ctx.fillStyle = "#ffffff";
        ctx.translate(b.x, b.y);
        ctx.rotate(b.t * 12);
        for (let i = 0; i < 4; i++) { ctx.rotate(Math.PI / 2); ctx.fillRect(-1, -9, 2, 9); }
        break;
      }
    }
    ctx.restore();
  }
}

function drawArcs() {
  for (const a of arcs) {
    const alpha = clamp(a.life / a.max, 0, 1);
    ctx.save();
    ctx.globalAlpha = alpha;
    if (!isMobile) { ctx.shadowColor = a.color; ctx.shadowBlur = 10; }
    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(a.x1, a.y1);
    const seg = 5;
    for (let i = 1; i < seg; i++) {
      const t = i / seg;
      ctx.lineTo(a.x1 + (a.x2 - a.x1) * t + rand(-9, 9), a.y1 + (a.y2 - a.y1) * t + rand(-9, 9));
    }
    ctx.lineTo(a.x2, a.y2);
    ctx.stroke();
    ctx.restore();
  }
}

/* =========================================================
 *  小隊繪製 —— 橫排編隊 + 兵種外觀進化
 * ========================================================= */
function drawSquad() {
  const tp = TROOPS[troopTier()];
  const tier = troopTier();
  for (const p of soldierPositions()) {
    ctx.save();
    ctx.translate(p.x, p.y);
    if (tp.aura) {
      ctx.strokeStyle = tp.aura;
      ctx.globalAlpha = .4 + Math.sin(G.time * 5) * .2;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(0, 12, tp.size + 5, 6, 0, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    if (!isMobile) { ctx.shadowColor = tp.body; ctx.shadowBlur = tier >= 3 ? 12 : 6; }
    ctx.fillStyle = tp.body;
    ctx.beginPath(); ctx.arc(0, 0, tp.size, 0, Math.PI * 2); ctx.fill();
    if (!isMobile) ctx.shadowBlur = 0;
    // 肩甲（重裝以上）
    if (tier >= 2) {
      ctx.fillStyle = "rgba(255,255,255,.25)";
      ctx.beginPath(); ctx.ellipse(-tp.size * .8, -2, tp.size * .35, tp.size * .5, .3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( tp.size * .8, -2, tp.size * .35, tp.size * .5, -.3, 0, Math.PI * 2); ctx.fill();
    }
    // 頭盔（動力甲以上有面罩發光縫）
    ctx.fillStyle = "#0e1320";
    ctx.beginPath(); ctx.arc(0, -3, tp.size * .62, Math.PI, 0); ctx.fill();
    if (tier >= 4) {
      ctx.strokeStyle = tp.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-tp.size * .4, -4); ctx.lineTo(tp.size * .4, -4); ctx.stroke();
    }
    // 槍管（越高階越粗長；泰坦雙叉光矛槍）
    ctx.strokeStyle = "#dfe7ff";
    ctx.lineWidth = 2.5 + tier * .5;
    ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(0, -13 - tier * 2.5); ctx.stroke();
    if (tier === 6) {
      ctx.strokeStyle = tp.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-4, -13); ctx.lineTo(-4, -22); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 4, -13); ctx.lineTo( 4, -22); ctx.stroke();
    }
    ctx.restore();
  }
  if (SQUAD.count > 15) {
    ctx.fillStyle = "#ffd24d";
    ctx.font = "900 16px sans-serif";
    ctx.textAlign = "center";
    if (!isMobile) { ctx.shadowColor = "#000"; ctx.shadowBlur = 6; }
    ctx.fillText("x" + SQUAD.count, SQUAD.x, squadY() - 30);
    if (!isMobile) ctx.shadowBlur = 0;
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBeams() {
  for (const bm of beams) {
    const a = clamp(bm.life / bm.max, 0, 1);
    ctx.save();
    ctx.globalAlpha = a;
    const grd = ctx.createLinearGradient(bm.x - bm.w / 2, 0, bm.x + bm.w / 2, 0);
    grd.addColorStop(0, "rgba(255,255,255,0)");
    grd.addColorStop(.5, "rgba(255,255,255,.95)");
    grd.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grd;
    ctx.fillRect(bm.x - bm.w / 2, 0, bm.w, H);
    ctx.fillStyle = "rgba(126,240,255,.5)";
    ctx.fillRect(bm.x - bm.w / 6, 0, bm.w / 3, H);
    ctx.restore();
  }
}

/* =========================================================
 *  威脅指示器 —— 頂端顯示各道類型與數量
 *  讓玩家判斷「這波該顧哪邊」
 * ========================================================= */
function drawThreatIndicators() {
  const draw = (cx, lane) => {
    const prof = PROFILES[lanes[lane].profile];
    const cnt = lanes[lane].count;
    // 威脅強度：數量越多越紅
    const heat = clamp(cnt / 14, 0, 1);
    const barW = 92, barH = 7;
    const y = 74;
    // 底條
    ctx.fillStyle = "rgba(0,0,0,.45)";
    ctx.fillRect(cx - barW / 2, y, barW, barH);
    // 熱度條（綠→黃→紅）
    const hue = 120 - heat * 120;
    ctx.fillStyle = `hsl(${hue}, 85%, 55%)`;
    ctx.fillRect(cx - barW / 2, y, barW * clamp(cnt / 16, 0, 1), barH);
    ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 1;
    ctx.strokeRect(cx - barW / 2, y, barW, barH);
    // 類型標籤 + 數量
    ctx.textAlign = "center";
    ctx.font = "900 13px 'Noto Sans TC', sans-serif";
    ctx.fillStyle = prof.color;
    if (!isMobile) { ctx.shadowColor = "#000"; ctx.shadowBlur = 4; }
    ctx.fillText(prof.label + " " + cnt, cx, y - 6);
    if (!isMobile) ctx.shadowBlur = 0;
    // 逼近警示箭頭（有怪快到防線時閃爍）
    const nearY = lane === "L" ? threatNearY.L : threatNearY.R;
    if (nearY > H * .6 && Math.sin(G.time * 12) > 0) {
      ctx.fillStyle = "#ff3d3d";
      ctx.font = "900 16px sans-serif";
      ctx.fillText("▼", cx, y + 22);
    }
  };
  draw(W * .25, "L");
  draw(W * .75, "R");
}
// 追蹤各道最逼近的 y（給指示器箭頭用）
const threatNearY = { L: 0, R: 0 };

function drawDmgTexts() {
  for (const d of dmgTexts) {
    const a = clamp(d.life / .7, 0, 1);
    ctx.globalAlpha = a;
    ctx.textAlign = "center";
    if (d.text) {
      ctx.font = d.small ? "700 18px 'Noto Sans TC', sans-serif" : "900 30px 'Noto Sans TC', sans-serif";
      ctx.fillStyle = d.color || "#7ef0ff";
      if (!isMobile) { ctx.shadowColor = d.color || "#4db8ff"; ctx.shadowBlur = 16; }
    } else if (d.text2) {
      ctx.font = "900 24px 'Noto Sans TC', sans-serif";
      ctx.fillStyle = "#7ef0ff";
      if (!isMobile) { ctx.shadowColor = "#4db8ff"; ctx.shadowBlur = 12; }
    } else {
      ctx.font = d.crit ? "900 19px sans-serif" : "700 13px sans-serif";
      ctx.fillStyle = d.crit ? "#ffd24d" : "#ffffff";
      if (!isMobile) { ctx.shadowColor = "#000"; ctx.shadowBlur = 4; }
    }
    ctx.fillText(d.v, d.x, d.y);
    if (!isMobile) ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawDangerVignette() {
  if (G.dangerAlpha <= 0.01) return;
  const grd = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * .35, W / 2, H / 2, Math.max(W, H) * .72);
  grd.addColorStop(0, "rgba(200,20,20,0)");
  grd.addColorStop(1, `rgba(200,20,20,${G.dangerAlpha})`);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

/* ---------- 主迴圈 ---------- */
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  if (G.running) {
    update(dt);
    // 更新指示器箭頭用的最逼近 y
    threatNearY.L = 0; threatNearY.R = 0;
    for (const z of zombies) {
      if (z.dead) continue;
      if (z.lane === "L") threatNearY.L = Math.max(threatNearY.L, z.y);
      else threatNearY.R = Math.max(threatNearY.R, z.y);
    }
    draw();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });

/* ---------- 開始 ---------- */
document.getElementById("startBtn").addEventListener("click", () => {
  document.getElementById("startScreen").style.display = "none";
  SQUAD.x = SQUAD.targetX = W / 2;
  rollLaneProfiles();
  G.running = true;
  refreshHUD();
});
</script>
</body>
